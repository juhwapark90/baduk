    const BOARD_SIZE = 9;

    let problemsList = [];
    let currentProblemIndex = 0;
    let userMarks = [];
    let isProblemSolved = false;
    let totalScore = 0;
    let currentMistakes = 0;
    let currentTopicKey = null;
    let quizResults = [];       // strictMode 퀴즈(Lv.5)의 문제별 채점 결과 { correct: bool } 목록
    let inExplanationMode = false; // screen-learn이 "개념 배우기"가 아니라 문제별 해설 슬라이드로 열렸는지

    /* =========================================================
       공통 유틸리티
    ========================================================= */
    function inBounds(x, y) { return x >= 0 && x <= 8 && y >= 0 && y <= 8; }
    function neighbors4(x, y) {
        return [[x-1,y],[x+1,y],[x,y-1],[x,y+1]].filter(p => inBounds(p[0], p[1]));
    }
    function key(x, y) { return x + '_' + y; }
    function randInt(a, b) { return a + Math.floor(Math.random() * (b - a + 1)); }
    function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            let j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // 연결된 돌 무리를 무작위로 성장시킨다 (occupied 셀은 피해서 자람)
    function growGroup(occupied, size, startX, startY) {
        let stones = [[startX, startY]];
        let stoneSet = new Set([key(startX, startY)]);
        while (stones.length < size) {
            let candidates = [];
            stones.forEach(([sx, sy]) => {
                neighbors4(sx, sy).forEach(([nx, ny]) => {
                    let k = key(nx, ny);
                    if (!stoneSet.has(k) && !occupied.has(k)) candidates.push([nx, ny]);
                });
            });
            if (candidates.length === 0) break;
            let pick = candidates[Math.floor(Math.random() * candidates.length)];
            stones.push(pick);
            stoneSet.add(key(pick[0], pick[1]));
        }
        return stones;
    }

    // 돌 무리의 활로(빈 이웃) 계산
    function computeLibs(stones, occSet) {
        let map = {};
        stones.forEach(([x, y]) => {
            neighbors4(x, y).forEach(([nx, ny]) => {
                let k = key(nx, ny);
                if (!occSet.has(k)) map[k] = [nx, ny];
            });
        });
        return Object.values(map);
    }

    // 지정된 활로 개수를 갖도록 돌 무리를 만든 후, 남길 활로/막을 활로를 나눠 반환
    function makeGroupWithLiberties(size, targetLibs, region) {
        region = region || { minX: 1, maxX: 7, minY: 1, maxY: 7 };
        for (let a = 0; a < 80; a++) {
            let sx = randInt(region.minX, region.maxX), sy = randInt(region.minY, region.maxY);
            let occ = new Set([key(sx, sy)]);
            let stones = growGroup(occ, size, sx, sy);
            if (stones.length < size) continue;
            let occ2 = new Set(stones.map(([x, y]) => key(x, y)));
            let libs = computeLibs(stones, occ2);
            if (libs.length < targetLibs) continue;
            shuffle(libs);
            let keep = libs.slice(0, targetLibs), block = libs.slice(targetLibs);
            return { stones, keep, block };
        }
        return null;
    }

    function toObjArr(arr) { return arr.map(([x, y]) => ({ x, y })); }

    /* =========================================================
       ① 활로찾기
    ========================================================= */
    function genLiberty(size) {
        let sx = randInt(1, 7), sy = randInt(1, 7);
        let occ = new Set([key(sx, sy)]);
        let stones = growGroup(occ, size, sx, sy);
        let occ2 = new Set(stones.map(([x, y]) => key(x, y)));
        let libs = computeLibs(stones, occ2);
        return {
            type: 'mark_multiple',
            blackStones: toObjArr(stones),
            whiteStones: [],
            answers: toObjArr(libs),
            desc: `표시된 흑돌${size > 1 ? '들' : ''}의 활로(숨구멍)를 모두 찾아 표시하세요!`
        };
    }

    /* =========================================================
       ② 단수의 기술
    ========================================================= */
    function genAtari(size) {
        let r = makeGroupWithLiberties(size, 2);
        if (!r) return genAtari(1);
        return {
            type: 'play_single',
            blackStones: toObjArr(r.block),
            whiteStones: toObjArr(r.stones),
            answers: toObjArr(r.keep),
            desc: '흰 돌을 단수칠 수 있는 자리를 찾아 흑돌을 놓아보세요! (활로를 1개로 줄이는 자리)'
        };
    }

    /* =========================================================
       ③ 따내기
    ========================================================= */
    // region을 주면 그 범위 안에서만 돌 무리를 만든다(구석/끝선 문제에 사용).
    // 안 주면 기존처럼 판 가운데 쪽(1~7행/열)에서 만든다.
    function genCapture(size, region) {
        let r = makeGroupWithLiberties(size, 1, region);
        if (!r) return genCapture(1);
        return {
            type: 'play_single',
            blackStones: toObjArr(r.block),
            whiteStones: toObjArr(r.stones),
            answers: toObjArr(r.keep),
            desc: '단수에 몰린 흰 돌을 따낼 수 있는 자리를 찾아 흑돌을 놓아보세요!'
        };
    }

    // 9x9 판의 네 구석(모서리) 중 하나를 무작위로 고른다. region은 makeGroupWithLiberties가
    // 돌 무리의 "시작점"만 고르는 범위라서, 범위를 넓게 주면(예: 3x3 박스) 시작점이 구석에서
    // 먼 칸으로 뽑혀 활로가 4개인 평범한 자리가 나올 수 있다. 그래서 시작점을 정확히
    // 구석 칸(활로 2개) 하나로 고정한다 — size가 2 이상이면 거기서 한 칸만 자란다.
    function randomCornerRegion() {
        const corners = [
            { minX: 0, maxX: 0, minY: 0, maxY: 0 },
            { minX: 8, maxX: 8, minY: 0, maxY: 0 },
            { minX: 0, maxX: 0, minY: 8, maxY: 8 },
            { minX: 8, maxX: 8, minY: 8, maxY: 8 }
        ];
        return corners[randInt(0, corners.length - 1)];
    }

    // 9x9 판의 네 변(끝선, 구석 제외) 중 하나를 무작위로 고른다. 구석과 같은 이유로,
    // 시작점의 한 축은 정확히 맨 끝줄(0 또는 8)로 고정하고 다른 축만 가운데 쪽에서
    // 무작위로 골라서, 시작점이 항상 활로 3개짜리 진짜 "끝선" 자리가 되게 한다.
    function randomEdgeRegion() {
        const edges = [
            { minX: 2, maxX: 6, minY: 0, maxY: 0 },
            { minX: 2, maxX: 6, minY: 8, maxY: 8 },
            { minX: 0, maxX: 0, minY: 2, maxY: 6 },
            { minX: 8, maxX: 8, minY: 2, maxY: 6 }
        ];
        return edges[randInt(0, edges.length - 1)];
    }

    /* =========================================================
       ⓪ 승부 결정하기 (집 세기 / 승자 맞히기)
    ========================================================= */
    // mode: 'simple' (1~5번, 동서/남북으로 확실하게 갈라 차이가 한눈에 보이는 맛보기 문제)
    //       'complex' (6~20번, 흑/백 모두 집이 여러 채로 흩어져 있고 판이 실제 종국처럼
    //       돌로 빽빽한 문제)
    function genTerritoryProblem(mode) {
        return mode === 'simple' ? genTerritorySimple() : genTerritoryComplex();
    }

    // 씨앗 하나짜리 물결 경계선으로 판을 동서(또는 남북)로 절반씩 딱 갈라서,
    // 집 차이가 누가 봐도 확실하게 드러나게 만든다.
    function genTerritorySimple() {
        let fallback = null;
        const transpose = Math.random() < 0.5;
        for (let attempt = 0; attempt < 300; attempt++) {
            let c = randInt(2, 6);
            const aOnLeft = Math.random() < 0.5;
            const boundaryCol = [];
            for (let row = 0; row < BOARD_SIZE; row++) {
                if (row > 0) {
                    c += randInt(-1, 1);
                    c = Math.max(1, Math.min(7, c));
                }
                boundaryCol.push(c);
            }

            const ownerMap = {};
            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    const side = col <= boundaryCol[row] ? (aOnLeft ? 'A' : 'B') : (aOnLeft ? 'B' : 'A');
                    const x = transpose ? row : col;
                    const y = transpose ? col : row;
                    ownerMap[key(x, y)] = side;
                }
            }

            const built = buildStonesAndTerritory(ownerMap);
            if (!built) continue;
            const diff = territoryDiffOf(built.sideAStones, built.sideBStones);
            if (diff === 0) continue;

            fallback = built;
            if (diff >= 8) break;
        }
        return finalizeTerritoryProblem(fallback,
            '바둑이 끝났어요! 누가 이겼을까요? 집이 훨씬 많은 쪽의 돌을 골라보세요!');
    }

    // 흑/백 각각 3~4개의 씨앗점을 뿌려 보로노이 방식으로 구역을 나누되, 구역마다 씨앗에서
    // 가까운 몇 칸만 실제 집(빈 칸)으로 남기고 나머지 내부 칸은 모두 돌로 채운다. 이러면
    // 판 전체가 돌로 빽빽하고 군데군데 작은 집만 남은 "실제 종국" 모습이 되고, 씨앗이
    // 여러 개라서 흑/백 모두 자연스럽게 3채 이상으로 나뉜 집을 갖게 된다.
    // (구역을 통째로 집으로 남기면 빈 공간이 너무 커져서 "게임 중간에 집계하는" 느낌이
    // 나기 때문에, 구역 크기와 상관없이 집 개수를 몇 칸으로 제한하는 방식으로 바꿨다.)
    // ownerMap/territoryKeys/zoneInterior를 그대로 돌려주므로, 정상 문제(genTerritoryComplex)와
    // 속임수 문제(genTerritoryTrick)가 이 모양 생성 로직 하나를 함께 쓴다.
    function genTerritoryComplexShape() {
        const seeds = [];
        const usedSeedKeys = new Set();
        const addSeeds = (side, count) => {
            let added = 0, tries = 0;
            while (added < count && tries < 50) {
                tries++;
                const x = randInt(0, 8), y = randInt(0, 8);
                const k = key(x, y);
                if (usedSeedKeys.has(k)) continue;
                usedSeedKeys.add(k);
                seeds.push({
                    idx: seeds.length, side,
                    jx: x + (Math.random() - 0.5) * 1.8,
                    jy: y + (Math.random() - 0.5) * 1.8
                });
                added++;
            }
        };
        addSeeds('A', randInt(3, 4));
        addSeeds('B', randInt(3, 4));
        if (!seeds.some(s => s.side === 'A') || !seeds.some(s => s.side === 'B')) return null;

        const ownerMap = {}, zoneMap = {};
        for (let y = 0; y < BOARD_SIZE; y++) {
            for (let x = 0; x < BOARD_SIZE; x++) {
                let best = null, bestDist = Infinity;
                seeds.forEach(s => {
                    const d = Math.abs(s.jx - x) + Math.abs(s.jy - y);
                    if (d < bestDist) { bestDist = d; best = s; }
                });
                ownerMap[key(x, y)] = best.side;
                zoneMap[key(x, y)] = best.idx;
            }
        }

        // 반대색과 맞닿은 경계 칸은 무조건 돌. 나머지 내부 칸은 구역별로 모아서,
        // 씨앗에 가까운 순서로 앞쪽 몇 칸(cap)만 집으로 남기고 나머지는 돌로 바꾼다.
        const zoneInterior = {};
        for (let y = 0; y < BOARD_SIZE; y++) {
            for (let x = 0; x < BOARD_SIZE; x++) {
                const k = key(x, y);
                const mySide = ownerMap[k];
                const isBoundary = neighbors4(x, y).some(([nx, ny]) => ownerMap[key(nx, ny)] !== mySide);
                if (isBoundary) continue;
                const idx = zoneMap[k];
                const s = seeds[idx];
                const dist = Math.abs(s.jx - x) + Math.abs(s.jy - y);
                (zoneInterior[idx] = zoneInterior[idx] || []).push({ x, y, dist, k });
            }
        }
        const territoryKeys = new Set();
        Object.values(zoneInterior).forEach(cells => {
            cells.sort((a, b) => a.dist - b.dist);
            const cap = randInt(2, 6);
            cells.slice(0, cap).forEach(c => territoryKeys.add(c.k));
        });

        // 실전 종국처럼 보이려면 흑/백 모두 집이 최소 3채는 되어야 하므로,
        // 그에 못 미치면 버리고 다시 만든다.
        const housesOf = (side) => {
            const cells = [];
            territoryKeys.forEach(k => { if (ownerMap[k] === side) cells.push(k); });
            const cellSet = new Set(cells);
            const visited = new Set();
            let houses = 0;
            cells.forEach(k => {
                if (visited.has(k)) return;
                houses++;
                const [x, y] = k.split('_').map(Number);
                const stack = [[x, y]];
                visited.add(k);
                while (stack.length) {
                    const [cx, cy] = stack.pop();
                    neighbors4(cx, cy).forEach(([nx, ny]) => {
                        const nk = key(nx, ny);
                        if (cellSet.has(nk) && !visited.has(nk)) { visited.add(nk); stack.push([nx, ny]); }
                    });
                }
            });
            return houses;
        };
        if (housesOf('A') < 3 || housesOf('B') < 3) return null;

        return { ownerMap, territoryKeys, zoneInterior };
    }

    function genTerritoryComplex() {
        const gapMode = Math.random() < 0.5 ? 'medium' : 'tight';
        let fallback = null;
        let validCount = 0;
        for (let attempt = 0; attempt < 300; attempt++) {
            const shape = genTerritoryComplexShape();
            if (!shape) continue;

            const built = buildStonesAndTerritory(shape.ownerMap, shape.territoryKeys);
            if (!built) continue;
            const diff = territoryDiffOf(built.sideAStones, built.sideBStones);
            if (diff === 0) continue;

            const inRange = gapMode === 'medium' ? (diff >= 3 && diff <= 9) : (diff >= 1 && diff <= 4);
            fallback = built;
            if (inRange) break;
            validCount++;
            if (validCount >= 20) break;
        }
        return finalizeTerritoryProblem(fallback,
            '바둑이 끝났어요! 양쪽에 집이 여러 군데 흩어져 있어요. 하나하나 꼼꼼히 세어서 이긴 쪽을 골라보세요!');
    }

    // 승부 결정하기 속임수 문제: 어떤 무리의 담벼락 한 칸을 비워서, 겉보기엔 여전히 둘러싸인
    // 집처럼 보이지만 그 틈으로 상대 돌과 바로 이어지게 만든다(Lv.2에서 배운 "빈 칸이 상대
    // 돌에도 닿으면 그 누구의 집도 아니다/공배"와 같은 규칙). 점수는 buildStonesAndTerritory가
    // 미리 정해둔 값을 믿지 않고, 실제 대국 화면과 같은 flood-fill 기반 계가(computePlayScore)로
    // 다시 계산해서 뚫린 무리가 자동으로 0집(공배) 처리되게 한다.
    // (주의: 담벼락 안에 상대 돌이 하나 "숨어" 있는 경우는 실제 계가에서는 그 돌이 죽은 돌로
    // 잡혀서 오히려 집 + 잡은 돌 1로 처리돼야 하므로 속임수로 쓰지 않는다 - 진짜 속임수는
    // 담이 끊겨 그 누구의 집도 아니게 되는 경우다.)
    function genTerritoryTrick() {
        for (let attempt = 0; attempt < 200; attempt++) {
            const shape = genTerritoryComplexShape();
            if (!shape) continue;
            const { ownerMap, territoryKeys } = shape;

            // 집 칸 바로 옆에 있으면서, 그 자신도 상대 진영과 맞닿아 있는 담벼락 돌을 찾는다.
            // 이 돌을 비우면 집이 그 틈을 통해 상대 돌과 바로 이어져서 공배가 된다.
            const gapCandidates = new Set();
            territoryKeys.forEach(k => {
                const [x, y] = k.split('_').map(Number);
                neighbors4(x, y).forEach(([nx, ny]) => {
                    const nk = key(nx, ny);
                    if (territoryKeys.has(nk)) return; // 같은 집 칸이면 담이 아니다
                    const wallSide = ownerMap[nk];
                    const touchesEnemy = neighbors4(nx, ny).some(([ex, ey]) => ownerMap[key(ex, ey)] !== wallSide);
                    if (touchesEnemy) gapCandidates.add(nk);
                });
            });
            if (gapCandidates.size === 0) continue;
            const gapList = [...gapCandidates];
            const gapKey = gapList[randInt(0, gapList.length - 1)];

            const blackIsA = Math.random() < 0.5;
            const board = Array.from({ length: BOARD_SIZE }, () => Array(BOARD_SIZE).fill(0));
            for (let y = 0; y < BOARD_SIZE; y++) {
                for (let x = 0; x < BOARD_SIZE; x++) {
                    const k = key(x, y);
                    if (k === gapKey) continue; // 담벼락을 뚫어서 빈 칸으로 남긴다
                    const mySide = ownerMap[k];
                    const isBoundary = neighbors4(x, y).some(([nx, ny]) => ownerMap[key(nx, ny)] !== mySide);
                    const isTerritory = !isBoundary && territoryKeys.has(k);
                    if (isTerritory) continue;
                    board[y][x] = (mySide === 'A') === blackIsA ? 'black' : 'white';
                }
            }

            const blackStones = [], whiteStones = [];
            for (let y = 0; y < BOARD_SIZE; y++) {
                for (let x = 0; x < BOARD_SIZE; x++) {
                    if (board[y][x] === 'black') blackStones.push({ x, y });
                    else if (board[y][x] === 'white') whiteStones.push({ x, y });
                }
            }

            const problem = scoreAndFinalizeTerritoryProblem(blackStones, whiteStones,
                '바둑이 끝났어요! 그런데 담이 한 곳 끊겨서, 집처럼 보이는 자리가 사실은 그 누구의 집도 아닌 공배일 수도 있어요. 벽이 온전히 이어져 있는지 확인하면서 집을 세어보세요!');
            if (!problem) continue;
            return problem;
        }
        return null;
    }

    // ownerMap(칸별 A/B 소유)으로 돌 배치를 계산한다. territoryKeys를 주면 그 칸들만 집으로
    // 남기고 나머지 내부 칸은 돌로 채우며(complex 모드), 안 주면 경계가 아닌 내부 칸 전체가
    // 집이 된다(simple 모드). 활로가 1개뿐(단수)인 돌 무리가 있으면 null을 돌려줘서 그
    // 배치를 버리게 한다. 실제 승부 점수는 여기서 매기지 않는다 - A/B 중 어느 쪽이 흑인지
    // 아직 안 정해졌을 뿐 아니라, "판에 남은 돌 개수"를 점수에 넣는 area 방식은 실제 대국
    // 계가(집 + 잡은 돌)와 달라서 다른 결과가 나올 수 있다. 진짜 점수는
    // scoreAndFinalizeTerritoryProblem에서 flood-fill 기반으로 다시 계산한다.
    function buildStonesAndTerritory(ownerMap, territoryKeys) {
        const sideAStones = [], sideBStones = [];
        for (let y = 0; y < BOARD_SIZE; y++) {
            for (let x = 0; x < BOARD_SIZE; x++) {
                const k = key(x, y);
                const mySide = ownerMap[k];
                const isBoundary = neighbors4(x, y).some(([nx, ny]) => ownerMap[key(nx, ny)] !== mySide);
                const isTerritory = !isBoundary && (!territoryKeys || territoryKeys.has(k));
                if (!isTerritory) {
                    (mySide === 'A' ? sideAStones : sideBStones).push({ x, y });
                }
            }
        }

        // 활로는 돌 하나가 아니라 "연결된 돌 무리(그룹)" 전체 기준으로 세야 바둑 규칙과 맞는다.
        const sideAKeys = new Set(sideAStones.map(p => key(p.x, p.y)));
        const sideBKeys = new Set(sideBStones.map(p => key(p.x, p.y)));
        const allStoneKeys = new Set([...sideAKeys, ...sideBKeys]);

        const minGroupLiberties = (stoneList, ownKeys) => {
            const visited = new Set();
            let minLibs = Infinity;
            stoneList.forEach(({ x, y }) => {
                const startKey = key(x, y);
                if (visited.has(startKey)) return;
                visited.add(startKey);
                const stack = [[x, y]];
                const libSet = new Set();
                while (stack.length) {
                    const [cx, cy] = stack.pop();
                    neighbors4(cx, cy).forEach(([nx, ny]) => {
                        const nk = key(nx, ny);
                        if (!allStoneKeys.has(nk)) {
                            libSet.add(nk);
                        } else if (ownKeys.has(nk) && !visited.has(nk)) {
                            visited.add(nk);
                            stack.push([nx, ny]);
                        }
                    });
                }
                if (libSet.size < minLibs) minLibs = libSet.size;
            });
            return minLibs;
        };
        const minLibsA = minGroupLiberties(sideAStones, sideAKeys);
        const minLibsB = minGroupLiberties(sideBStones, sideBKeys);
        if (minLibsA < 2 || minLibsB < 2) return null;

        return { sideAStones, sideBStones };
    }

    // 두 편의 돌 배치만으로(어느 색인지는 상관없이) 순수 집 차이를 구한다 - genTerritorySimple/
    // genTerritoryComplex가 "이 정도로 차이 나는 배치가 나왔으면 채택" 판단에만 쓰는 값이라,
    // 실제 최종 점수(집 + 잡은 돌)와는 별개다.
    function territoryDiffOf(sideAStones, sideBStones) {
        const board = Array.from({ length: BOARD_SIZE }, () => Array(BOARD_SIZE).fill(0));
        sideAStones.forEach(p => board[p.y][p.x] = 'black');
        sideBStones.forEach(p => board[p.y][p.x] = 'white');
        const t = computePlayScore(board);
        return Math.abs(t.blackTerritory - t.whiteTerritory);
    }

    // blackStones/whiteStones로 확정된 판을 실제 대국처럼(집 + 잡은 돌) 정확히 채점한다.
    // 집은 실제 대국 화면과 같은 flood-fill 기반 계가(computePlayScore)로 구하고, 이 예시엔
    // 실제 대국 기록이 없어 잡은 돌 수는 무작위로 정하되 문제 화면에 숫자로 그대로 보여줘서
    // 사용자가 판의 집을 세고 거기에 더해 직접 검증할 수 있게 한다.
    function scoreAndFinalizeTerritoryProblem(blackStones, whiteStones, desc) {
        const board = Array.from({ length: BOARD_SIZE }, () => Array(BOARD_SIZE).fill(0));
        blackStones.forEach(p => board[p.y][p.x] = 'black');
        whiteStones.forEach(p => board[p.y][p.x] = 'white');
        const t = computePlayScore(board);

        let capturedByBlack = 0, capturedByWhite = 0, blackScore = 0, whiteScore = 0, settled = false;
        for (let i = 0; i < 20; i++) {
            capturedByBlack = randInt(0, 4);
            capturedByWhite = randInt(0, 4);
            blackScore = t.blackTerritory + capturedByBlack;
            whiteScore = t.whiteTerritory + capturedByWhite;
            if (blackScore !== whiteScore) { settled = true; break; }
        }
        if (!settled) return null;

        const winner = blackScore > whiteScore ? 'black' : 'white';
        return {
            type: 'choose_side',
            blackStones, whiteStones,
            blackTerritory: t.blackTerritory, whiteTerritory: t.whiteTerritory,
            capturedByBlack, capturedByWhite,
            blackScore, whiteScore, winner,
            desc
        };
    }

    // genTerritorySimple/genTerritoryComplex가 만든 {sideAStones, sideBStones}에서 어느 쪽이
    // 흑인지 무작위로 정한 뒤 scoreAndFinalizeTerritoryProblem으로 넘긴다.
    function finalizeTerritoryProblem(best, desc) {
        if (!best) return null;
        const blackIsA = Math.random() < 0.5;
        const blackStones = blackIsA ? best.sideAStones : best.sideBStones;
        const whiteStones = blackIsA ? best.sideBStones : best.sideAStones;
        return scoreAndFinalizeTerritoryProblem(blackStones, whiteStones, desc);
    }

    /* =========================================================
       집의 개념 : 몇집일까?
    ========================================================= */
    // 빈 칸 덩어리(growGroup 재사용)를 하나 무작위로 기르고, 그 덩어리를 완전히
    // 둘러싸는 흑돌 벽을 만든다. 판 가장자리에 닿으면 벽이 뚫리므로 다시 만든다.
    // mode:
    //  - 'basic'/'shape' : 안에 아무것도 없이 그대로 센다 (shape는 더 큰 덩어리로
    //                      다양하고 재미있는 모양이 나오게 한다)
    //  - 'trick'         : 덩어리 안(빈 칸)에 백돌을 하나 몰래 놓아서 "안에 다른 색 돌이
    //                      있으면 집이 아니다"(집 개수 0)를 보여준다
    //  - 'application'   : 벽 바깥, 안쪽 빈 칸과는 직접 닿지 않는 자리에 백돌을 하나
    //                      놓아서 "담벼락 바깥에 붙은 돌은 집에 영향이 없다"를 보여준다
    // blackStones/whiteStones로 표현된 판에서 흑집을 표준 규칙대로 정확히 센다: 빈 칸을
    // flood-fill해서, 그 영역이 흑에만 닿고 백에는 안 닿을 때만(공배 아닐 때만) 집으로 센다.
    // 하드코딩된 가정 없이 매번 실제로 계산하므로, 어떤 모양이 나오든 항상 정확하다.
    // blobSet을 주면, 원래 만들었던 "덩어리" 칸들만 집으로 세고 판의 나머지 빈 공간(이
    // 문제와 상관없는 여백)은 세지 않는다 - 담이 끊겨서 그 여백과 이어지면 공배 판정으로
    // 자연히 0이 되지만, 안 끊긴 경우에 판의 텅 빈 나머지 공간까지 흑집으로 잡히는 걸 막는다.
    function computeBlackTerritoryCount(blackStones, whiteStones, blobSet) {
        const blackSet = new Set(blackStones.map(s => key(s.x, s.y)));
        const whiteSet = new Set(whiteStones.map(s => key(s.x, s.y)));
        const visited = new Set();
        let total = 0;
        for (let y = 0; y < BOARD_SIZE; y++) {
            for (let x = 0; x < BOARD_SIZE; x++) {
                const k = key(x, y);
                if (blackSet.has(k) || whiteSet.has(k) || visited.has(k)) continue;
                visited.add(k);
                const stack = [[x, y]];
                const region = [[x, y]];
                let touchesWhite = false, touchesBlack = false;
                while (stack.length) {
                    const [cx, cy] = stack.pop();
                    neighbors4(cx, cy).forEach(([nx, ny]) => {
                        const nk = key(nx, ny);
                        if (whiteSet.has(nk)) { touchesWhite = true; return; }
                        if (blackSet.has(nk)) { touchesBlack = true; return; }
                        if (!visited.has(nk)) { visited.add(nk); region.push([nx, ny]); stack.push([nx, ny]); }
                    });
                }
                if (touchesBlack && !touchesWhite) {
                    total += blobSet ? region.filter(([rx, ry]) => blobSet.has(key(rx, ry))).length : region.length;
                }
            }
        }
        return total;
    }

    function genTerritoryCount(mode) {
        for (let attempt = 0; attempt < 200; attempt++) {
            const size = mode === 'shape' ? randInt(10, 16) : randInt(6, 12);
            const sx = randInt(3, 5), sy = randInt(3, 5);
            const blobArr = growGroup(new Set(), size, sx, sy);
            if (blobArr.length < size) continue;
            const blobSet = new Set(blobArr.map(([x, y]) => key(x, y)));

            let touchesEdge = false;
            const wallSet = new Set();
            blobArr.forEach(([x, y]) => {
                if (x === 0 || x === 8 || y === 0 || y === 8) touchesEdge = true;
                neighbors4(x, y).forEach(([nx, ny]) => {
                    const nk = key(nx, ny);
                    if (!blobSet.has(nk)) wallSet.add(nk);
                });
            });
            if (touchesEdge || wallSet.size < 4) continue;

            let whiteStones = [];
            let desc = '까맣게 둘러싸인 빈 칸을 잘 세어보세요. 이 흑집은 몇 집일까요?';

            if (mode === 'trick') {
                // 담벼락(벽) 중 한 칸을 치워서 진짜로 "끊긴" 자리를 만들고, 그 끊긴 틈의
                // 바깥쪽에 백돌을 하나 둔다. 벽이 끊기면 안쪽 빈 칸이 그 틈을 통해 바깥의
                // 백돌과 이어지므로, 표준 규칙(빈 칸이 백에도 닿으면 공배)대로 계산하면
                // 자연스럽게 0집이 된다 - "백돌이 하나라도 있으면 무조건 0"이 아니라,
                // 실제로 담이 끊겨서 이어졌을 때만 0이 되는 게 핵심이다.
                const wallArr = [...wallSet];
                const gapKey = wallArr[randInt(0, wallArr.length - 1)];
                const [gx, gy] = gapKey.split('_').map(Number);
                const outerNeighbors = neighbors4(gx, gy).filter(([nx, ny]) => {
                    const nk = key(nx, ny);
                    return !blobSet.has(nk) && nk !== gapKey && !wallSet.has(nk);
                });
                if (outerNeighbors.length === 0) continue;
                wallSet.delete(gapKey);
                const [wx, wy] = outerNeighbors[randInt(0, outerNeighbors.length - 1)];
                whiteStones = [{ x: wx, y: wy }];
                desc = '어라? 담벼락 한 곳이 끊겨 있어요! 안쪽이 바깥의 백돌과 이어져 버렸어요. 이 흑집은 몇 집일까요?';
            } else if (mode === 'application') {
                const outerCandidates = [];
                wallSet.forEach(wk => {
                    const [wx, wy] = wk.split('_').map(Number);
                    neighbors4(wx, wy).forEach(([ox, oy]) => {
                        const ok = key(ox, oy);
                        if (blobSet.has(ok) || wallSet.has(ok)) return;
                        const touchesBlob = neighbors4(ox, oy).some(([nx, ny]) => blobSet.has(key(nx, ny)));
                        if (!touchesBlob) outerCandidates.push({ x: ox, y: oy });
                    });
                });
                if (outerCandidates.length === 0) continue;
                whiteStones = [outerCandidates[randInt(0, outerCandidates.length - 1)]];
                desc = '담벼락 바깥에 백돌이 하나 붙어있어요. 담이 끊기지 않았다면 안쪽 집 개수에 영향이 없어요. 몇 집인지 세어보세요!';
            }

            const blackStones = [...wallSet].map(k => { const [x, y] = k.split('_').map(Number); return { x, y }; });
            const answer = computeBlackTerritoryCount(blackStones, whiteStones, blobSet);

            const decoyPool = new Set();
            if (answer === 0) {
                [blobArr.length, blobArr.length - 1, blobArr.length + 1].forEach(n => { if (n > 0) decoyPool.add(n); });
            } else {
                [answer - 2, answer - 1, answer + 1, answer + 2, 0].forEach(n => { if (n >= 0 && n !== answer) decoyPool.add(n); });
            }
            const decoys = shuffle([...decoyPool]).slice(0, 3);
            const options = shuffle([answer, ...decoys]);

            return { type: 'choose_number', blackStones, whiteStones, answer, options, desc };
        }
        return null;
    }

    /* =========================================================
       주제 목록 및 문제 세트 생성
    ========================================================= */

        // 매번 같은 거시적 순서(예: hook-single-column 반복)로 고정되지도 않는다.
        for (let attempt = 0; attempt < 200; attempt++) {
            const candidate = shuffle(LV5_QUIZ_CONFIGS.slice());
            let hasAdjacentSameShape = false;
            for (let i = 1; i < candidate.length; i++) {
                if (candidate[i].shape === candidate[i - 1].shape) { hasAdjacentSameShape = true; break; }
            }
            if (!hasAdjacentSameShape) { lv5ShuffledConfigs = candidate; return; }
        }
        lv5ShuffledConfigs = LV5_QUIZ_CONFIGS.slice(); // 극히 드문 실패 시 원래 순서로 안전하게 대체

            let hasAdjacentSameShape = false;
            for (let i = 1; i < candidate.length; i++) {
                if (candidate[i].shape === candidate[i - 1].shape) { hasAdjacentSameShape = true; break; }
            }
            if (!hasAdjacentSameShape) { lv7ShuffledConfigs = candidate; return; }
        }
        lv7ShuffledConfigs = LV7_QUIZ_CONFIGS.slice();

    /* =========================================================
       화면/게임 제어 (기존 로직 재사용, 100 -> 가변 개수로 일반화)
    ========================================================= */
    function buildHomeScreen() {
        let list = document.getElementById('topic-list');
        list.innerHTML = '';
        const character = getActiveCharacter();
        const hasCharacter = !!(currentUser && character);
        TOPICS.forEach((t, idx) => {
            let btn = document.createElement('button');

            if (t.disabled) {
                btn.className = 'topic-btn locked';
                btn.innerHTML = `
                    <div class="topic-top-row"><span>🔒 ${t.title}</span></div>
                    <span class="desc-line">${t.sub}</span>
                `;
                btn.onclick = () => alert('아직 준비 중이에요! 조금만 기다려주세요 🙏');
                list.appendChild(btn);
                return;
            }

            let scoreInfo = hasCharacter ? topicScoreInfo(t, character) : { points: 0, cleared: false };
            let points = scoreInfo.points;
            let isCleared = scoreInfo.cleared;
            let levelTestWon = hasCharacter && !!(character.levelTestsWon && character.levelTestsWon[t.key]);
            let fullyCleared = hasCharacter && isTopicFullyCleared(t, character);
            let unlocked = hasCharacter && isTopicUnlocked(idx, character);
            let locked = !hasCharacter || !unlocked;
            btn.className = 'topic-btn' + (locked ? ' locked' : '');
            let lockIcon = locked ? '🔒 ' : '';
            let badge = fullyCleared ? '<span class="level-badge">✅ 클리어</span>'
                : (t.levelTest && isCleared && !levelTestWon) ? `<span class="level-badge">${GOBOARD_ICON_SVG} 레벨테스트 도전 가능</span>` : '';

            let progressLine;
            if (!hasCharacter) {
                progressLine = '';
            } else if (!unlocked) {
                progressLine = `<span class="topic-progress-text">이전 레벨을 클리어하면 열려요</span>`;
            } else {
                let remain = isCleared ? '' : ` (클리어까지 ${CLEAR_THRESHOLD - points}점)`;
                progressLine = `
                    <div class="topic-progress-bg"><div class="topic-progress-fill" style="width:${points}%"></div></div>
                    <span class="topic-progress-text">${points}/${SCORE_MAX}점 (최고 기록)${remain}</span>`;
            }

            let quizCount = (t.counts || [7, 7, 6]).reduce((a, b) => a + b, 0);
            let modeNote = t.learnSlides ? `개념 배우기 + 퀴즈 ${quizCount}문제` : `랜덤 ${quizCount}문제`;
            btn.innerHTML = `
                <div class="topic-top-row">
                    <span>${lockIcon}${t.title}</span>
                    ${badge}
                </div>
                <span class="desc-line">${t.sub} · ${modeNote}</span>
                ${progressLine}
            `;
            btn.onclick = () => startTopic(t.key);
            list.appendChild(btn);
        });
    }

    // 상단바 "이전" 아이콘용 화면 이동 기록. goBackScreen()으로 되돌아갈 때는 그 자체를
    // 다시 기록에 쌓지 않도록 isNavigatingBack 플래그로 한 번만 건너뛴다.
    let screenHistory = [];
    let isNavigatingBack = false;

    function switchScreen(screenId) {
        const current = document.querySelector('.screen.active');
        if (current && current.id !== screenId && !isNavigatingBack) {
            screenHistory.push(current.id);
        }
        isNavigatingBack = false;
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function goBackScreen() {
        closeTopMenu();
        if (screenHistory.length === 0) { goHome(); return; }
        const prev = screenHistory.pop();
        isNavigatingBack = true;
        switchScreen(prev);
    }

    function goHome() {
        renderCharacterHeader();
        buildHomeScreen();
        switchScreen('screen-home');
    }

    // 퀴즈 화면/결과 화면의 "주제 목록으로" 버튼용.
    function backToTopicList() {
        goHome();
    }

    function startTopic(topicKey) {
        if (!currentUser) { alert('먼저 구글 로그인을 해주세요!'); return; }
        const character = getActiveCharacter();
        if (!character) { openCharacterSelect(); return; }
        const idx = TOPICS.findIndex(t => t.key === topicKey);
        let topic = TOPICS[idx];
        if (topic.disabled) { alert('아직 준비 중이에요! 조금만 기다려주세요 🙏'); return; }
        if (!isTopicUnlocked(idx, character)) { alert('이전 레벨을 먼저 클리어해야 열려요!'); return; }
        currentTopicKey = topicKey;
        if (topic.learnSlides) {
            document.getElementById('topic-intro-title').innerText = topic.title;
            document.getElementById('topic-intro-sub').innerText = topic.sub;
            document.getElementById('topic-intro-leveltest-btn').style.display = topic.levelTest ? '' : 'none';
            switchScreen('screen-topic-intro');
        } else {
            beginTopicQuiz(topicKey);
        }
    }

    // screen-topic-intro의 "퀴즈 풀기" 버튼용.
    function startIntroQuiz() {
        beginTopicQuiz(currentTopicKey);
    }

    function beginTopicQuiz(topicKey) {
        currentTopicKey = topicKey;
        let topic = TOPICS.find(t => t.key === topicKey);
        if (topicKey === 'atariattack1') resetLv5QuizOrder(); // 매 시도마다 모양별 순서를 새로 섞는다
        if (topicKey === 'atariattack2') resetLv6QuizOrder();
        if (topicKey === 'atariattack3') resetLv7QuizOrder();
        problemsList = generateTopicSet(topic.tiers, topic.counts);
        currentProblemIndex = 0;
        totalScore = 0;
        quizResults = [];
        document.getElementById('game-title').innerText = topic.title;
        initBoard();
        switchScreen('screen-game');
    }

    function retryTopic() {
        beginTopicQuiz(currentTopicKey);
    }

    /* =========================================================
       개념 배우기 슬라이드 (돌 잡아먹기 등, 실제 대국판과 같은 9x9 미니 바둑판)
    ========================================================= */
    const LEARN_BOARD_SIZE = 9;
    let currentLearnSlides = [];
    let currentLearnIdx = 0;
    const LEARN_ARROW_SVG = `<svg class="learn-arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="6"/><polyline points="6,11 12,5 18,11"/></svg>`;

    // 활로 표시 점(point)이 "누구의" 활로인지 방향을 계산한다. 이 슬라이드들은 전부 백돌(무리)의
    // 활로를 보여주는 것이므로, 먼저 그 점과 직접 맞닿은(거리 1) 백돌을 찾아 그 기준으로 방향을
    // 정한다 - 흑돌도 우연히 거리가 같이 가까울 수 있어서(예: 활로 바로 옆에 막은 흑돌이 있는 경우)
    // 무조건 "가장 가까운 아무 돌"을 기준으로 삼으면 엉뚱한(흑돌 쪽) 방향이 나올 수 있었다.
    // 백돌이 없는 슬라이드(이미 다 잡힌 경우 등)는 아무 돌이나 가장 가까운 쪽을 기준으로 삼는다.
    function learnHighlightDirection(slide, point) {
        function nearestAdjacent(list) {
            let best = null;
            (list || []).forEach(s => {
                const d = Math.abs(s.x - point.x) + Math.abs(s.y - point.y);
                if (d === 1) best = s;
            });
            return best;
        }
        function nearestAny(list) {
            let best = null, bestDist = Infinity;
            (list || []).forEach(s => {
                const d = Math.abs(s.x - point.x) + Math.abs(s.y - point.y);
                if (d < bestDist) { bestDist = d; best = s; }
            });
            return best;
        }
        const best = nearestAdjacent(slide.whiteStones)
            || nearestAny([...(slide.blackStones || []), ...(slide.whiteStones || [])]);
        if (!best) return 'up';
        if (point.x > best.x) return 'right';
        if (point.x < best.x) return 'left';
        if (point.y > best.y) return 'down';
        return 'up';
    }

    function learnArrowHtml(dir) {
        return `<div class="learn-arrow-wrap"><div class="learn-arrow-${dir}">${LEARN_ARROW_SVG}</div></div>`;
    }

    function openLearnSlides() {
        const topic = TOPICS.find(t => t.key === currentTopicKey);
        currentLearnSlides = topic.learnSlides;
        currentLearnIdx = 0;
        renderLearnSlide();
        switchScreen('screen-learn');
    }

    function renderLearnSlide() {
        const slide = currentLearnSlides[currentLearnIdx];
        const grid = document.getElementById('learn-grid');
        grid.innerHTML = '';
        for (let i = 0; i < LEARN_BOARD_SIZE; i++) {
            let h = document.createElement('div'); h.className = 'line-h'; h.style.top = (i / (LEARN_BOARD_SIZE - 1) * 100) + '%';
            grid.appendChild(h);
            let v = document.createElement('div'); v.className = 'line-v'; v.style.left = (i / (LEARN_BOARD_SIZE - 1) * 100) + '%';
            grid.appendChild(v);
        }
        // #learn-grid 자체가 이미 .learn-board 안에서 %로 오프셋돼 있으므로, 그 안에 들어가는
        // 선/돌은 여기서 다시 더하지 않고 그리드 내부 좌표(%)만 쓴다. 화면 크기와 상관없이
        // 항상 같은 비율로 배치되도록 px 대신 %로 위치를 잡는다. cell 자신에게도 한 칸 크기
        // 만큼 width/height를 %로 줘야, 그 안의 .stone/.learn-arrow-wrap이 쓰는 %가 (auto 크기가
        // 아니라) 그 칸 크기를 기준으로 정확히 계산된다. flex 중앙 정렬을 꼭 줘야 cell 박스 자체가
        // 아니라 그 "안의 내용물"이 교차점에 정확히 오도록 맞춰진다(이게 빠져 있던 게 정렬 버그의 원인).
        const cellPct = 100 / (LEARN_BOARD_SIZE - 1);
        const place = (x, y, html) => {
            let cell = document.createElement('div');
            cell.style.position = 'absolute';
            cell.style.left = (x / (LEARN_BOARD_SIZE - 1) * 100) + '%';
            cell.style.top = (y / (LEARN_BOARD_SIZE - 1) * 100) + '%';
            cell.style.width = cellPct + '%';
            cell.style.height = cellPct + '%';
            cell.style.transform = 'translate(-50%, -50%)';
            cell.style.display = 'flex';
            cell.style.alignItems = 'center';
            cell.style.justifyContent = 'center';
            cell.innerHTML = html;
            grid.appendChild(cell);
        };
        // lastMove로 지정된 돌은 실제 대국 화면과 같은 "방금 둔 수" 표시(작은 빨간 점)를 붙인다.
        const isLastMove = p => slide.lastMove && slide.lastMove.x === p.x && slide.lastMove.y === p.y;
        slide.blackStones.forEach(p => place(p.x, p.y, `<div class="stone black${isLastMove(p) ? ' last-move' : ''}"></div>`));
        slide.whiteStones.forEach(p => place(p.x, p.y, `<div class="stone white${isLastMove(p) ? ' last-move' : ''}"></div>`));
        (slide.highlights || []).forEach(p => place(p.x, p.y, learnArrowHtml(learnHighlightDirection(slide, p))));
        (slide.xmarks || []).forEach(p => place(p.x, p.y, '<div class="learn-mark-x"></div>'));
        (slide.labels || []).forEach(p => place(p.x, p.y, `<div class="learn-label-badge">${p.text}</div>`));

        document.getElementById('learn-title').innerText = slide.title;
        document.getElementById('learn-caption').innerText = slide.desc;
        document.getElementById('learn-progress').innerText = `${currentLearnIdx + 1} / ${currentLearnSlides.length}`;
        document.getElementById('learn-prev-btn').style.visibility = currentLearnIdx === 0 ? 'hidden' : 'visible';
        const isLastSlide = currentLearnIdx === currentLearnSlides.length - 1;
        const isLastProblem = currentProblemIndex === problemsList.length - 1;
        document.getElementById('learn-next-btn').innerText = !isLastSlide ? '다음 ▶'
            : inExplanationMode ? (isLastProblem ? '결과 확인하기 ▶' : '다음 문제 보기 ▶')
            : '퀴즈 풀러가기 ▶';
    }
