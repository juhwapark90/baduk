    // 바둑돌을 놓을 때 나는 "딱" 소리. 외부 오디오 파일 없이 Web Audio API로 짧은
    // 노이즈 버스트를 만들어 재생한다(오프라인에서도 동작, 별도 리소스 불필요).
    let audioCtx = null;
    function playStoneSound() {
        try {
            audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const duration = 0.045;
            const sampleRate = audioCtx.sampleRate;
            const buffer = audioCtx.createBuffer(1, Math.floor(sampleRate * duration), sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < data.length; i++) {
                const t = i / data.length;
                data[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, 6);
            }

            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;

            const bandpass = audioCtx.createBiquadFilter();
            bandpass.type = 'bandpass';
            bandpass.frequency.value = 2200;
            bandpass.Q.value = 0.7;

            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.9, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

            noise.connect(bandpass).connect(gain).connect(audioCtx.destination);
            noise.start();
            noise.stop(audioCtx.currentTime + duration);
        } catch (e) { /* 오디오를 지원하지 않는 환경에서는 조용히 무시 */ }
    }

    function toggleMark(x, y) {
        if (isProblemSolved) return;
        const currentProblem = problemsList[currentProblemIndex];
        if (currentProblem.type === 'choose_side' || currentProblem.type === 'choose_number') return;

        if (currentProblem.blackStones.some(s => s.x === x && s.y === y)) return;
        if (currentProblem.whiteStones.some(s => s.x === x && s.y === y)) return;

        const cell = document.getElementById(`pos-${x}-${y}`);
        const markIndex = userMarks.findIndex(m => m.x === x && m.y === y);

        if (markIndex > -1) {
            userMarks.splice(markIndex, 1);
            cell.innerHTML = "";
        } else {
            if (currentProblem.type === "mark_multiple") {
                userMarks.push({x, y});
                cell.innerHTML = `<div class="stone white preview"></div>`;
                playStoneSound();
            } else if (currentProblem.type === "play_single") {
                if (userMarks.length > 0) {
                    const prev = userMarks[0];
                    document.getElementById(`pos-${prev.x}-${prev.y}`).innerHTML = "";
                    userMarks = [];
                }
                userMarks.push({x, y});
                cell.innerHTML = `<div class="stone black preview"></div>`;
                playStoneSound();
            }
        }
        document.getElementById('message').innerText = "";
    }

    // strictMode(Lv.5): 오답이어도 다시 기회를 주지 않고 바로 채점 -> 정답 공개 -> 해설 슬라이드
    // 순서로 진행한다. 문제당 배점은 10점 고정(10문제 x 10점 = 100점, 최종 결과표/포인트와 그대로 연결).
    function isStrictModeTopic() {
        const topic = TOPICS.find(t => t.key === currentTopicKey);
        return !!(topic && topic.strictMode);
    }

    function checkAnswer() {
        if (isProblemSolved) return;
        const currentProblem = problemsList[currentProblemIndex];
        const answers = currentProblem.answers;
        const strict = isStrictModeTopic();

        if (userMarks.length === 0) {
            const emptyMsg = currentProblem.type === 'choose_side'
                ? "흑과 백 중 이겼다고 생각하는 쪽을 골라보세요!"
                : currentProblem.type === 'choose_number'
                ? "몇 집인지 골라보세요!"
                : "정답이라고 생각하는 곳에 돌을 놓아보세요!";
            showMessage(emptyMsg, false); return;
        }

        let isCorrect = false;
        let countMismatch = false;
        if (currentProblem.type === "choose_side") {
            isCorrect = userMarks[0].choice === currentProblem.winner;
        } else if (currentProblem.type === "choose_number") {
            isCorrect = userMarks[0].choice === currentProblem.answer;
        } else if (currentProblem.type === "mark_multiple") {
            if (userMarks.length !== answers.length) {
                if (!strict) { currentMistakes++; showMessage("숨구멍 갯수가 안맞아요! 다시 세어볼까요?", false); return; }
                countMismatch = true;
            } else {
                isCorrect = answers.every(ans => userMarks.some(m => m.x === ans.x && m.y === ans.y));
            }
        } else {
            const userAns = userMarks[0];
            isCorrect = answers.some(ans => userAns.x === ans.x && userAns.y === ans.y);
        }
        if (countMismatch) isCorrect = false;

        if (strict) {
            isProblemSolved = true;
            quizResults.push({ correct: isCorrect });
            if (isCorrect) {
                totalScore += 10;
                showMessage("정답이에요! 🎉", true);
                userMarks.forEach(m => {
                    const st = document.getElementById(`pos-${m.x}-${m.y}`).querySelector('.stone');
                    if (st) st.classList.remove('preview');
                });
            } else {
                showMessage("오답이에요! 정답을 확인해보세요.", false);
                revealAnswerMarkers(currentProblem);
            }
            document.getElementById('btn-check').style.display = "none";
            document.getElementById('btn-next').style.display = "inline-block";
            document.getElementById('btn-next').innerText = "해설 보기 ▶";
            return;
        }

        if (isCorrect) {
            isProblemSolved = true;
            let earnedPoints = Math.max(10 - (currentMistakes * 2), 2);
            totalScore += earnedPoints;

            if (currentProblem.type === "choose_side") {
                const winnerLabel = currentProblem.winner === 'black' ? '⚫ 흑' : '⚪ 백';
                showMessage(`정답이에요! ${winnerLabel} 승리! (흑 ${currentProblem.blackScore}집 · 백 ${currentProblem.whiteScore}집) 🎉`, true);
            } else if (currentProblem.type === "choose_number") {
                showMessage(`정답이에요! ${currentProblem.answer}집이었어요! 🎉`, true);
            } else {
                showMessage("참 잘했어요! 완벽해요! 🎉", true);
                userMarks.forEach(m => {
                   const st = document.getElementById(`pos-${m.x}-${m.y}`).querySelector('.stone');
                   if(st) st.classList.remove('preview');
                });
            }

            document.getElementById('btn-check').style.display = "none";
            document.getElementById('btn-next').style.display = "inline-block";
        } else {
            currentMistakes++;
            const wrongMsg = currentProblem.type === 'choose_side'
                ? "다시 세어볼까요? 집을 꼼꼼히 세어보세요!"
                : currentProblem.type === 'choose_number'
                ? "다시 세어볼까요? 혹시 안에 다른 색 돌이 숨어있진 않은지도 확인해보세요!"
                : "아쉽네요. 조금만 더 생각해 볼까요?";
            showMessage(wrongMsg, false);
        }
    }

    // strictMode 오답 시, 정답 자리에 초록 표시를 남기고 내가 고른(틀린) 자리는 빨간 테두리로 표시한다.
    function revealAnswerMarkers(problem) {
        const ans = problem.answers[0];
        if (ans) {
            const correctCell = document.getElementById(`pos-${ans.x}-${ans.y}`);
            if (correctCell && !correctCell.querySelector('.stone')) {
                correctCell.innerHTML = `<div class="answer-correct-marker"></div>`;
            }
        }
        const guess = userMarks[0];
        if (guess && guess.x !== undefined) {
            const guessCell = document.getElementById(`pos-${guess.x}-${guess.y}`);
            const st = guessCell ? guessCell.querySelector('.stone') : null;
            if (st) { st.classList.remove('preview'); st.classList.add('wrong-guess'); }
        }
    }

    function showMessage(text, isSuccess) {
        const msgDiv = document.getElementById('message');
        msgDiv.innerText = text;
        msgDiv.className = isSuccess ? "message success-msg" : "message";
    }

    // "다음 문제" 버튼의 실제 동작 - strictMode(Lv.5)면 먼저 해설 슬라이드를 보여주고,
    // 해설을 다 보면(learnNext) 그때 실제로 다음 문제로 넘어간다. 일반 퀴즈는 그대로 바로 다음 문제.
    function onQuizNextClicked() {
        if (isStrictModeTopic()) {
            showExplanationForCurrentProblem();
        } else {
            nextProblem();
        }
    }

    function showExplanationForCurrentProblem() {
        const problem = problemsList[currentProblemIndex];
        currentLearnSlides = problem.explainSlides;
        currentLearnIdx = 0;
        inExplanationMode = true;
        renderLearnSlide();
        switchScreen('screen-learn');
    }

    function nextProblem() {
        currentProblemIndex++;
        if (currentProblemIndex >= problemsList.length) {
            finishTopicQuiz(problemsList.length * 10);
        } else {
            loadProblem();
        }
    }

    function finishTopicQuiz(roundMax) {
        const scaledScore = Math.min(SCORE_MAX, Math.round((totalScore / roundMax) * SCORE_MAX));
        document.getElementById('final-score').innerText = scaledScore;
        let topic = TOPICS.find(t => t.key === currentTopicKey);
        document.getElementById('result-topic-msg').innerText =
            `"${topic.title}" 문제 ${problemsList.length}개를 모두 풀었어요!`;
        renderQuizResultsTable();
        document.getElementById('result-leveltest-btn').style.display = topic.levelTest ? '' : 'none';
        const saveMsgEl = document.getElementById('result-save-msg');
        if (currentUser && getActiveCharacter()) {
            const result = saveTopicResult(currentTopicKey, totalScore, roundMax);
            renderCharacterHeader();
            saveMsgEl.innerHTML = (result && result.justCleared)
                ? `기록이 저장됐어요! 🙌 🎉 레벨 클리어! 다음 레벨이 열렸어요! ${charLevelBadgeHtml(result.newCharacterLevel)}`
                : '기록이 저장됐어요! 🙌';
        } else {
            saveMsgEl.innerText = '로그인하면 기록이 저장돼요. (홈 화면에서 로그인해보세요!)';
        }
        switchScreen('screen-result');
    }

    // strictMode 퀴즈(Lv.5)를 다 풀면 문제 1~N번까지 O/X와 문제당 10점 배점을 표로 보여주고
    // 마지막 행에 총점을 더해서 보여준다. 이 총점이 곧 위 saveTopicResult에 넘기는 totalScore와
    // 같은 값이라, 표에 나오는 점수가 그대로 캐릭터 포인트에도 반영된다.
    function renderQuizResultsTable() {
        const wrap = document.getElementById('quiz-results-table-wrap');
        if (!quizResults.length) { wrap.style.display = 'none'; wrap.innerHTML = ''; return; }
        wrap.style.display = 'block';
        const rows = quizResults.map((r, i) => `
            <tr>
                <td>${i + 1}번</td>
                <td>${r.correct ? '⭕' : '❌'}</td>
                <td>${r.correct ? 10 : 0}점</td>
            </tr>`).join('');
        const total = quizResults.reduce((sum, r) => sum + (r.correct ? 10 : 0), 0);
        wrap.innerHTML = `
            <table class="quiz-result-table">
                <thead><tr><th>문제</th><th>결과</th><th>배점</th></tr></thead>
                <tbody>${rows}</tbody>
                <tfoot><tr><td colspan="2">총점</td><td>${total}점</td></tr></tfoot>
            </table>`;
    }

    /* =========================================================
       바둑 게임 해보기 (오프라인 같이두기 / AI 대국) - 실제 대국 엔진
    ========================================================= */
    let playBoard = null;          // 9x9 배열, 셀 값: 0(빈칸) | 'black' | 'white'
    let playTurn = 'black';
    let playHistory = [];          // 각 수를 두기 "직전" 상태의 스냅샷 목록 (다시두기/무름/차례넘기기 취소용)
    let playCapturedBy = { black: 0, white: 0 }; // 각 색이 "잡아낸" 상대 돌 개수
    let playLastMove = null;       // 방금 둔 수 {x,y} - 판에서 시각적으로 표시해준다
    let playConsecutivePasses = 0; // 연속 패스 횟수 - 2번 연속(양쪽 다 패스)이면 대국이 끝난다
    let playMode = null;            // 'offline' | 'ai'
    let playOpponentName = '';
    let playAiDifficulty = null;
    let levelTestTopicKey = null;  // 'leveltest' 모드일 때, 통과 시 어느 주제의 levelTestsWon을 기록할지
    let levelTestMovesLeft = 0;    // 레벨테스트에서 유저(흑)에게 남은 착수(패스 포함) 허용 횟수
    let playGameEnded = false;     // 대국종료 후에는 새 대국을 시작하기 전까지 착수/되돌리기를 막는다
    const AI_DIFFICULTY_LABEL = { beginner0: '왕초보', beginner: '초보', mid: '중수', high: '고수', pro: '프로' };

    function playInBounds(x, y) { return x >= 0 && x <= 8 && y >= 0 && y <= 8; }
    function playNeighbors(x, y) {
        return [[x - 1, y], [x + 1, y], [x, y - 1], [x, y + 1]].filter(p => playInBounds(p[0], p[1]));
    }
    function makeEmptyPlayBoard() {
        return Array.from({ length: 9 }, () => Array(9).fill(0));
    }
    function clonePlayBoard(board) { return board.map(row => row.slice()); }

    // (x,y) 돌이 속한 무리(연결된 같은 색 돌들)와 그 무리의 활로 개수를 구한다.
    function getGroupAndLiberties(board, x, y) {
        const color = board[y][x];
        if (!color) return null;
        const visited = new Set([x + '_' + y]);
        const stack = [[x, y]];
        const stones = [];
        const libs = new Set();
        while (stack.length) {
            const [cx, cy] = stack.pop();
            stones.push([cx, cy]);
            playNeighbors(cx, cy).forEach(([nx, ny]) => {
                const nc = board[ny][nx];
                const nk = nx + '_' + ny;
                if (nc === 0) libs.add(nk);
                else if (nc === color && !visited.has(nk)) { visited.add(nk); stack.push([nx, ny]); }
            });
        }
        return { stones, liberties: libs.size, libertyPoints: [...libs].map(k => k.split('_').map(Number)) };
    }

    function boardsEqual(a, b) {
        for (let y = 0; y < 9; y++) for (let x = 0; x < 9; x++) if (a[y][x] !== b[y][x]) return false;
        return true;
    }

    // board에 (x,y)에 color 돌을 두려고 시도한다. 이미 돌이 있거나 자충수(자살수)면 실패.
    // koBoard가 주어지면(직전 상대 수를 두기 "전" 판 상태), 이 수를 둔 결과가 koBoard와 똑같아지는
    // 경우도 실패 처리한다 - 패(劫): 단수를 주고받으며 같은 자리를 계속 따내는 것을 막는 규칙.
    // 성공하면 상대 돌 중 활로가 0이 된 무리를 모두 따내고 새 board와 잡은 돌 목록을 돌려준다.
    function tryPlayMove(board, x, y, color, koBoard) {
        if (board[y][x] !== 0) return { ok: false, reason: 'occupied' };
        const newBoard = clonePlayBoard(board);
        newBoard[y][x] = color;
        const opponent = color === 'black' ? 'white' : 'black';
        const captured = [];
        const processed = new Set();
        playNeighbors(x, y).forEach(([nx, ny]) => {
            const nk = nx + '_' + ny;
            if (newBoard[ny][nx] === opponent && !processed.has(nk)) {
                const g = getGroupAndLiberties(newBoard, nx, ny);
                g.stones.forEach(([sx, sy]) => processed.add(sx + '_' + sy));
                if (g.liberties === 0) {
                    g.stones.forEach(([sx, sy]) => { newBoard[sy][sx] = 0; });
                    captured.push(...g.stones.map(([sx, sy]) => ({ x: sx, y: sy })));
                }
            }
        });
        const myGroup = getGroupAndLiberties(newBoard, x, y);
        if (captured.length === 0 && myGroup.liberties === 0) return { ok: false, reason: 'suicide' };
        if (koBoard && boardsEqual(newBoard, koBoard)) return { ok: false, reason: 'ko' };
        return { ok: true, board: newBoard, captured };
    }

    function listLegalMoves(board, color, koBoard) {
        const moves = [];
        for (let y = 0; y < 9; y++) {
            for (let x = 0; x < 9; x++) {
                if (board[y][x] !== 0) continue;
                if (tryPlayMove(board, x, y, color, koBoard).ok) moves.push({ x, y });
            }
        }
        return moves;
    }

    // 판을 area 방식(돌 + 집)으로 채점한다. 양쪽 색과 모두 맞닿은 빈 칸(공배)은 어느 쪽 집도 아니다.
    function computePlayScore(board) {
        const visited = new Set();
        let blackTerritory = 0, whiteTerritory = 0;
        const territoryCells = [];
        for (let y = 0; y < 9; y++) {
            for (let x = 0; x < 9; x++) {
                if (board[y][x] !== 0) continue;
                const k = x + '_' + y;
                if (visited.has(k)) continue;
                visited.add(k);
                const stack = [[x, y]];
                const region = [[x, y]];
                let touchesBlack = false, touchesWhite = false;
                while (stack.length) {
                    const [cx, cy] = stack.pop();
                    playNeighbors(cx, cy).forEach(([nx, ny]) => {
                        const nc = board[ny][nx];
                        if (nc === 'black') touchesBlack = true;
                        else if (nc === 'white') touchesWhite = true;
                        else {
                            const nk = nx + '_' + ny;
                            if (!visited.has(nk)) { visited.add(nk); region.push([nx, ny]); stack.push([nx, ny]); }
                        }
                    });
                }
                if (touchesBlack && !touchesWhite) {
                    blackTerritory += region.length;
                    region.forEach(([rx, ry]) => territoryCells.push({ x: rx, y: ry, side: 'black' }));
                } else if (touchesWhite && !touchesBlack) {
                    whiteTerritory += region.length;
                    region.forEach(([rx, ry]) => territoryCells.push({ x: rx, y: ry, side: 'white' }));
                }
            }
        }
        let blackStones = 0, whiteStones = 0;
        for (let y = 0; y < 9; y++) for (let x = 0; x < 9; x++) {
            if (board[y][x] === 'black') blackStones++;
            else if (board[y][x] === 'white') whiteStones++;
        }
        return {
            blackScore: blackStones + blackTerritory,
            whiteScore: whiteStones + whiteTerritory,
            blackTerritory, whiteTerritory, blackStones, whiteStones,
            territoryCells
        };
    }

    // 대국 종료 시 실제 승부를 가르는 계가: 한국/일본 바둑처럼 집(둘러싼 빈 칸) + 잡은 돌 수로 계산한다.
    // (위 computePlayScore의 blackScore/whiteScore는 AI가 국면을 대충 평가할 때 쓰는 area 방식 - 판에
    // 남은 돌 개수도 점수로 치는데, 그건 "잡은 돌 자체"가 점수에 안 보여서 이 결과 화면용으로는 안 맞다.)
    function computeFinalScore(board, capturedBy) {
        const area = computePlayScore(board);
        return {
            blackTerritory: area.blackTerritory,
            whiteTerritory: area.whiteTerritory,
            blackCaptures: capturedBy.black,
            whiteCaptures: capturedBy.white,
            blackScore: area.blackTerritory + capturedBy.black,
            whiteScore: area.whiteTerritory + capturedBy.white,
            territoryCells: area.territoryCells
        };
    }

    /* ---------- 화면 전환 ---------- */
    function openPlayMenu() {
        if (!currentUser) { alert('먼저 구글 로그인을 해주세요!'); return; }
        if (!getActiveCharacter()) { openCharacterSelect(); return; }
        switchScreen('screen-play-menu');
    }
    function openOfflineSetup() {
        document.getElementById('opponent-name-input').value = '';
        switchScreen('screen-play-offline-setup');
    }
    function openAiSetup() { switchScreen('screen-play-ai-setup'); }

    function resetPlayState() {
        playBoard = makeEmptyPlayBoard();
        playTurn = 'black';
        playHistory = [];
        playCapturedBy = { black: 0, white: 0 };
        playGameEnded = false;
        playLastMove = null;
        playConsecutivePasses = 0;
        document.getElementById('play-message').innerText = '';
    }

    function startOfflineGame() {
        const nameInput = document.getElementById('opponent-name-input').value.trim();
        playMode = 'offline';
        playOpponentName = nameInput || '상대방';
        playAiDifficulty = null;
        resetPlayState();
        initPlayBoard();
        switchScreen('screen-play-board');
    }

    function startAiGame(difficulty) {
        playMode = 'ai';
        playAiDifficulty = difficulty;
        playOpponentName = '';
        resetPlayState();
        initPlayBoard();
        switchScreen('screen-play-board');
    }

    // 레벨테스트: 정해진 초기 배치(예: Lv.5의 활로 2개짜리 백돌 무리)로 시작해서, 유저(흑)가
    // 실제로 그 백돌을 끝까지 잡아내야 통과하는 미니게임. 퀴즈처럼 정답 한 곳을 찍는 게 아니라
    // AI(고수 난이도)가 진짜로 도망치며 버틴다 - moveLimit 안에 다 잡으면 승리, 못 잡으면 패배.
    function startLevelTest() {
        const topic = TOPICS.find(t => t.key === currentTopicKey);
        const character = getActiveCharacter();
        if (!topic || !topic.levelTest || !character) return;
        if (!topicScoreInfo(topic, character).cleared) {
            alert(`먼저 퀴즈에서 ${CLEAR_THRESHOLD}점 이상을 받아야 레벨테스트에 도전할 수 있어요!`);
            return;
        }
        playMode = 'leveltest';
        playAiDifficulty = null;
        playOpponentName = '';
        resetPlayState();
        topic.levelTest.black.forEach(([x, y]) => { playBoard[y][x] = 'black'; });
        topic.levelTest.white.forEach(([x, y]) => { playBoard[y][x] = 'white'; });
        levelTestTopicKey = topic.key;
        levelTestMovesLeft = topic.levelTest.moveLimit;
        initPlayBoard();
        document.getElementById('play-message').innerText = topic.levelTest.desc || '';
        switchScreen('screen-play-board');
    }

    function countPlayBoardColor(board, color) {
        let n = 0;
        for (let y = 0; y < 9; y++) for (let x = 0; x < 9; x++) if (board[y][x] === color) n++;
        return n;
    }

    function playRestartSameGame() {
        closePlayEndPopup();
        if (playMode === 'leveltest') { startLevelTest(); return; } // 빈 판이 아니라 레벨테스트 초기 배치로 다시 시작
        resetPlayState();
        initPlayBoard();
    }

    /* ---------- 바둑판 렌더링 ---------- */
    function initPlayBoard() {
        const gridLines = document.getElementById('play-grid-lines');
        const intersections = document.getElementById('play-intersections');
        gridLines.innerHTML = ''; intersections.innerHTML = '';

        for (let i = 0; i < BOARD_SIZE; i++) {
            let hLine = document.createElement('div'); hLine.className = 'line-h'; hLine.style.top = (i / (BOARD_SIZE - 1) * 100) + '%';
            gridLines.appendChild(hLine);
            let vLine = document.createElement('div'); vLine.className = 'line-v'; vLine.style.left = (i / (BOARD_SIZE - 1) * 100) + '%';
            gridLines.appendChild(vLine);
        }
        for (let y = 0; y < BOARD_SIZE; y++) {
            for (let x = 0; x < BOARD_SIZE; x++) {
                let inter = document.createElement('div');
                inter.className = 'intersection';
                inter.style.left = ((x + 0.5) / BOARD_SIZE * 100) + '%'; inter.style.top = ((y + 0.5) / BOARD_SIZE * 100) + '%';
                inter.id = `play-pos-${x}-${y}`;
                inter.onclick = () => playCellClick(x, y);
                intersections.appendChild(inter);
            }
        }
        renderPlayBars();
        renderPlayBoardStones();
        renderPlayTurnIndicator();
    }

    // 잡은 돌 개수 옆에 보여줄 작은 바둑돌 아이콘. 잡힌 쪽 색(=상대 돌 색)으로 그린다 -
    // 내(흑) 잡은 수 옆엔 흰돌, 상대(백) 잡은 수 옆엔 검은돌이 보여야 "무엇을 잡았는지" 바로 보인다.
    function miniStoneHtml(color) {
        return `<span class="mini-stone ${color}"></span>`;
    }

    function renderPlayBars() {
        const character = getActiveCharacter();
        const infoBar = document.getElementById('play-info-bar');
        if (character) {
            const level = characterLevel(character);
            infoBar.innerHTML = `
                ${avatarHtml(character, 32)}
                <div class="ch-info">
                    <div class="ch-name-row">${character.name} ${charLevelBadgeHtml(level)}</div>
                    <div class="ch-points-row">💰 ${walletBalance(character)}P</div>
                </div>
                <div class="play-capture-count">${miniStoneHtml('white')}${playCapturedBy.black}개 잡음</div>`;
        } else {
            infoBar.innerHTML = '';
        }

        const opponentBar = document.getElementById('play-opponent-bar');
        const label = playMode === 'ai'
            ? `🤖 AI (${AI_DIFFICULTY_LABEL[playAiDifficulty] || ''})`
            : playMode === 'leveltest'
            ? `${GOBOARD_ICON_SVG} 레벨테스트 백돌 (남은 기회 ${levelTestMovesLeft}수)`
            : `🧑‍🤝‍🧑 ${playOpponentName}`;
        opponentBar.innerHTML = `
            <div class="op-info">${label}</div>
            <div class="play-capture-count">${miniStoneHtml('black')}${playCapturedBy.white}개 잡음</div>`;
    }

    function renderPlayBoardStones() {
        for (let y = 0; y < 9; y++) {
            for (let x = 0; x < 9; x++) {
                const cell = document.getElementById(`play-pos-${x}-${y}`);
                const v = playBoard[y][x];
                const isLast = playLastMove && playLastMove.x === x && playLastMove.y === y;
                cell.innerHTML = v ? `<div class="stone ${v}${isLast ? ' last-move' : ''}"></div>` : '';
            }
        }
    }

    function renderPlayTurnIndicator() {
        const el = document.getElementById('play-turn-indicator');
        const character = getActiveCharacter();
        const blackLabel = character ? character.name : '흑';
        const whiteLabel = playMode === 'ai'
            ? `AI(${AI_DIFFICULTY_LABEL[playAiDifficulty] || ''})`
            : playMode === 'leveltest'
            ? '레벨테스트 백돌'
            : (playOpponentName || '백');
        el.innerText = playTurn === 'black'
            ? `⚫ ${blackLabel}님 차례예요!`
            : `⚪ ${whiteLabel} 차례예요!`;
    }

    /* ---------- 착수 / 컨트롤 ---------- */
    function playCellClick(x, y) {
        if (playGameEnded) return; // 대국이 끝난 뒤에는 판을 건드릴 수 없다
        if ((playMode === 'ai' || playMode === 'leveltest') && playTurn !== 'black') return; // AI/레벨테스트 차례에는 사람이 대신 두지 못하게 막는다
        attemptPlayMove(x, y);
    }

    function attemptPlayMove(x, y) {
        // 패(劫) 규칙: 직전 상대 수를 두기 "전" 판 상태를 다시 만드는 수는 둘 수 없다.
        const koBoard = playHistory.length > 0 ? playHistory[playHistory.length - 1].board : null;
        const result = tryPlayMove(playBoard, x, y, playTurn, koBoard);
        document.getElementById('play-message').innerText = '';
        if (!result.ok) {
            document.getElementById('play-message').innerText =
                result.reason === 'occupied' ? '이미 돌이 있어요!'
                : result.reason === 'ko' ? '패! 상대 돌을 바로 다시 따낼 수 없어요. 다른 곳에 먼저 둬보세요.'
                : '그 자리에는 둘 수 없어요 (자충수)!';
            return;
        }
        playHistory.push({ board: clonePlayBoard(playBoard), turn: playTurn, capturedBy: { ...playCapturedBy }, lastMove: playLastMove, passes: playConsecutivePasses });
        playBoard = result.board;
        if (result.captured.length > 0) playCapturedBy[playTurn] += result.captured.length;
        playLastMove = { x, y };
        playConsecutivePasses = 0; // 실제로 돌을 뒀으니 연속 패스 기록은 끊긴다
        playStoneSound();
        playTurn = playTurn === 'black' ? 'white' : 'black';
        renderPlayBoardStones();
        renderPlayTurnIndicator();
        if (result.captured.length > 0) renderPlayBars(); // 잡은 돌 수가 바뀌었을 때만 다시 그린다

        // 이번 수(흑/백 누구든)로 백이 확정된 눈(홑눈) 2개 이상을 갖추게 됐다면, 더 두지 않고
        // 바로 백의 방어 성공으로 끝낸다 - 백이 스스로 눈을 메우다 결국 잡히는 사고를 원천 차단한다.
        if (playMode === 'leveltest' && levelTestSingleEyePoints(playBoard).length >= 2) { levelTestEndGame(false); return; }

        if (playMode === 'ai' && playTurn === 'white') {
            setTimeout(aiTakeTurn, 450);
        } else if (playMode === 'leveltest' && playTurn === 'white') {
            // 방금 유저(흑)가 뒀다 - 이번 수까지 포함해서 남은 횟수를 센다.
            levelTestMovesLeft--;
            renderPlayBars(); // 상단의 "남은 기회" 표시를 갱신한다
            if (countPlayBoardColor(playBoard, 'white') === 0) { levelTestEndGame(true); return; }
            if (levelTestMovesLeft <= 0) { levelTestEndGame(false); return; }
            setTimeout(levelTestAiTakeTurn, 450);
        }
    }

    // 다시두기: 바로 직전 한 수만 되돌린다 (실수로 뒀을 때 대비). 레벨테스트는 실제로 잡아내는
    // 실력을 확인하는 것이라 무르기를 허용하지 않는다.
    function playUndo() {
        if (playGameEnded) return;
        if (playMode === 'leveltest') { document.getElementById('play-message').innerText = '레벨테스트에서는 다시두기를 쓸 수 없어요!'; return; }
        if (playHistory.length === 0) { document.getElementById('play-message').innerText = '되돌릴 수 있는 수가 없어요!'; return; }
        const prev = playHistory.pop();
        playBoard = prev.board; playTurn = prev.turn; playCapturedBy = prev.capturedBy; playLastMove = prev.lastMove || null;
        playConsecutivePasses = prev.passes || 0;
        document.getElementById('play-message').innerText = '';
        renderPlayBoardStones();
        renderPlayTurnIndicator();
        renderPlayBars();
    }

    // 무름: 방금 둔 수와 그 이전 수까지, 두 수를 함께 되돌린다.
    function playTakeback() {
        if (playGameEnded) return;
        if (playMode === 'leveltest') { document.getElementById('play-message').innerText = '레벨테스트에서는 무르기를 쓸 수 없어요!'; return; }
        if (playHistory.length === 0) { document.getElementById('play-message').innerText = '무를 수 있는 수가 없어요!'; return; }
        const first = playHistory.pop();
        const second = playHistory.length > 0 ? playHistory.pop() : first;
        playBoard = second.board; playTurn = second.turn; playCapturedBy = second.capturedBy; playLastMove = second.lastMove || null;
        playConsecutivePasses = second.passes || 0;
        document.getElementById('play-message').innerText = '';
        renderPlayBoardStones();
        renderPlayTurnIndicator();
        renderPlayBars();
    }

    // isAiPass: AI가 둘 만한 곳이 없어서 스스로 패스한 경우 - 사람 쪽에 왜 아무 일도
    // 안 일어났는지 알려주는 안내 메시지를 보여준다. 실제 바둑 규칙대로 양쪽이 연속으로
    // 패스하면(playConsecutivePasses가 2가 되면) 대국이 자동으로 끝난다.
    function playPass(isAiPass) {
        if (playGameEnded) return;
        playHistory.push({ board: clonePlayBoard(playBoard), turn: playTurn, capturedBy: { ...playCapturedBy }, lastMove: playLastMove, passes: playConsecutivePasses });
        playConsecutivePasses++;
        playTurn = playTurn === 'black' ? 'white' : 'black';
        document.getElementById('play-message').innerText = isAiPass ? 'AI가 더 둘 만한 곳이 없어서 차례를 넘겼어요.' : '';
        renderPlayTurnIndicator();
        if (playConsecutivePasses >= 2) {
            if (playMode === 'leveltest') { levelTestEndGame(countPlayBoardColor(playBoard, 'white') === 0); return; }
            playEndGame();
            return;
        }
        if (playMode === 'ai' && playTurn === 'white') {
            setTimeout(aiTakeTurn, 450);
        } else if (playMode === 'leveltest' && playTurn === 'white') {
            levelTestMovesLeft--;
            renderPlayBars();
            if (countPlayBoardColor(playBoard, 'white') === 0) { levelTestEndGame(true); return; }
            if (levelTestMovesLeft <= 0) { levelTestEndGame(false); return; }
            setTimeout(levelTestAiTakeTurn, 450);
        }
    }

    function playEndGame() {
        playGameEnded = true;
        // 한국식 계가: 집 + 잡은 돌 수로 승부를 가른다 (판에 남은 돌 개수는 점수에 안 들어간다).
        const score = computeFinalScore(playBoard, playCapturedBy);
        score.territoryCells.forEach(({ x, y }) => {
            document.getElementById(`play-pos-${x}-${y}`).innerHTML = '<div class="play-mark-x"></div>';
        });

        const character = getActiveCharacter();
        const blackLabel = character ? character.name : '흑';
        const whiteLabel = playMode === 'ai'
            ? `AI(${AI_DIFFICULTY_LABEL[playAiDifficulty] || ''})`
            : playMode === 'leveltest'
            ? '레벨테스트 백돌'
            : (playOpponentName || '백');
        const diff = Math.abs(score.blackScore - score.whiteScore);
        const winnerText = score.blackScore === score.whiteScore
            ? '무승부예요!'
            : score.blackScore > score.whiteScore
            ? `⚫ ${blackLabel}님이 ${diff}집 차이로 승리!`
            : `⚪ ${whiteLabel}이(가) ${diff}집 차이로 승리!`;

        document.getElementById('play-end-summary').innerHTML = `
            <div class="modal-score-row">⚫ ${blackLabel}: 집 ${score.blackTerritory} + 잡은 돌 ${score.blackCaptures} = ${score.blackScore}집</div>
            <div class="modal-score-row">⚪ ${whiteLabel}: 집 ${score.whiteTerritory} + 잡은 돌 ${score.whiteCaptures} = ${score.whiteScore}집</div>
            <div class="modal-winner-row">${winnerText}</div>
        `;
        document.getElementById('play-end-popup').classList.add('active');
    }

    function closePlayEndPopup() {
        document.getElementById('play-end-popup').classList.remove('active');
    }

    /* ---------- AI (왕초보 / 초보 / 중수 / 고수) ---------- */
    // 9x9 판의 화점(귀 4곳 + 중앙 천원) - 초반에 이 근처를 선호하도록 유도해서
    // "잡을 게 없으면 아무데나 두는" 문제를 없앤다.
    const AI_STAR_POINTS = [[2, 2], [2, 6], [6, 2], [6, 6], [4, 4]];

    function countStonesOnBoard(board) {
        let n = 0;
        for (let y = 0; y < 9; y++) for (let x = 0; x < 9; x++) if (board[y][x] !== 0) n++;
        return n;
    }

    // 사다리(축) 읽기: 활로 2개로 몰린 무리를 계속 몰아붙였을 때(단수 -> 도망 -> 단수 -> ...)
    // 결국 잡히는지 시뮬레이션한다. true면 chaserColor가 사다리로 반드시 잡을 수 있다는 뜻이라,
    // "일단 몰고 보는" 헛수와 "실제로 잡히는" 압박을 구분할 수 있다.
    function readLadder(board, startX, startY, chaserColor) {
        let simBoard = clonePlayBoard(board);
        const fleeColor = simBoard[startY][startX];
        let ax = startX, ay = startY;
        for (let step = 0; step < 20; step++) {
            const g = getGroupAndLiberties(simBoard, ax, ay);
            if (!g || g.liberties === 0) return true;
            if (g.liberties >= 3) return false; // 활로가 늘어나며 벗어남
            if (g.liberties === 1) return true; // 마지막 활로만 메우면 바로 잡힘

            let advanced = false;
            for (const [lx, ly] of g.libertyPoints) {
                const afterChase = tryPlayMove(simBoard, lx, ly, chaserColor);
                if (!afterChase.ok) continue;
                const chased = getGroupAndLiberties(afterChase.board, ax, ay);
                if (!chased || chased.liberties === 0) return true;
                if (chased.liberties !== 1) continue; // 이 방향으로 몰아도 단수가 안 됨 - 다른 활로 시도
                const [ex, ey] = chased.libertyPoints[0];
                const afterFlee = tryPlayMove(afterChase.board, ex, ey, fleeColor);
                if (!afterFlee.ok) return true; // 도망갈 수조차 없음 - 잡힘
                simBoard = afterFlee.board;
                ax = ex; ay = ey;
                advanced = true;
                break;
            }
            if (!advanced) return false; // 몰아붙일 방법이 없음 - 사다리 실패로 안전하게 처리
        }
        return false; // 스텝 초과 - 사다리 안 통하는 것으로 처리
    }

    // color의 돌 중 지금 단수(활로 1개)인 무리들의 "살릴 수 있는 지점"을 모아둔다.
    // 후보 수마다 매번 판 전체를 다시 훑지 않도록 aiChooseMove에서 한 번만 계산해서 넘겨준다.
    function findAtariLibertyPoints(board, color) {
        const seen = new Set();
        const points = [];
        for (let y = 0; y < 9; y++) for (let x = 0; x < 9; x++) {
            if (board[y][x] !== color) continue;
            const k = x + '_' + y;
            if (seen.has(k)) continue;
            const g = getGroupAndLiberties(board, x, y);
            g.stones.forEach(([sx, sy]) => seen.add(sx + '_' + sy));
            if (g.liberties === 1) points.push(g.libertyPoints[0]);
        }
        return points;
    }

    // 후보 수 하나를 평가해서 점수를 매긴다. 점수가 높을수록 AI가 선호하는 수.
    // 잡기/단수 회피 같은 전술 점수에 더해 집(computePlayScore) 차이와 모양(내 돌 근처인지),
    // 초반 화점 선호, 사다리가 실제로 통하는지, 단수된 내 돌을 살리는지까지 반영해서
    // "잡을 게 없는 국면"에서도 방향성 있게 두고 돌을 지키고 압박하는 판단을 하도록 한다.
    // myAtariLibertyPoints: 초보 이상 난이도에서만 쓰는, 지금 단수인 내 무리들의 구원 지점 목록.
    function evaluateAiMove(board, x, y, color, difficulty, myAtariLibertyPoints, oppTerritorySet, myTerritorySet) {
        const opponent = color === 'black' ? 'white' : 'black';
        const result = tryPlayMove(board, x, y, color);
        let score = randInt(0, 2);
        score += result.captured.length * 12;

        const myGroup = getGroupAndLiberties(result.board, x, y);
        score += Math.min(myGroup.liberties, 4);
        if (myGroup.liberties === 1) score -= 10; // 스스로 단수에 놓이는 수는 피한다

        // 이미 상대 집으로 완전히 둘러싸여 확정된 자리 - 그 구역의 경계가 전부 상대 돌뿐이라는
        // 뜻이므로(빈틈이 있었다면 애초에 "확정 집"으로 잡히지 않았을 것) 잡는 게 없는 한 어디에
        // 둬도 이어질 아군이 전혀 없다. 활로 개수와 무관하게 뻔히 잡아먹힐 수이므로 크게 감점한다.
        if (oppTerritorySet && oppTerritorySet.has(x + '_' + y) && result.captured.length === 0) {
            score -= 35;
        }
        // 잡는 것도 없이 이미 확정된 내 집을 메우는 수 - 후보 필터링(candidateMoves)에서 대부분
        // 걸러지지만, 다른 둘 곳이 아예 없어 전체 수를 그대로 채점해야 할 때를 대비한 안전장치.
        if (myTerritorySet && myTerritorySet.has(x + '_' + y) && result.captured.length === 0) {
            score -= 30;
        }

        // 이 수로 상대 무리를 단수로 몰았다면 가산점. 활로 2개로 몰아넣은 경우(사다리 모양)엔
        // 실제로 사다리가 통하는지 확인해서, 안 통하는 헛된 추격에는 점수를 주지 않는다.
        const processedOpp = new Set();
        playNeighbors(x, y).forEach(([nx, ny]) => {
            const nk = nx + '_' + ny;
            if (result.board[ny][nx] === opponent && !processedOpp.has(nk)) {
                const g = getGroupAndLiberties(result.board, nx, ny);
                g.stones.forEach(([sx, sy]) => processedOpp.add(sx + '_' + sy));
                if (g.liberties === 1) {
                    score += 6;
                } else if (g.liberties === 2 && difficulty !== 'beginner') {
                    if (readLadder(result.board, nx, ny, color)) score += 8; // 사다리로 확실히 잡힘
                    else score -= 2; // 도망가는 사다리 - 괜히 몰아붙이지 않는다
                }
            }
        });

        // 원래 단수였던 내 무리를 이 수로 살렸다면 큰 가산점 - "돌을 지키는" 가장 기본적인 판단.
        // 살린 뒤에도 사다리로 다시 쫓기면(활로 2개뿐이고 사다리가 통하면) 가산점을 줄인다.
        if (difficulty !== 'beginner' && myAtariLibertyPoints && myAtariLibertyPoints.some(([lx, ly]) => lx === x && ly === y) && myGroup.liberties >= 2) {
            const stillChased = myGroup.liberties === 2 && readLadder(result.board, x, y, opponent);
            score += stillChased ? 4 : 15;
        }

        // 집 차이(내 집 - 상대 집). 초반엔 아직 집이 갈리지 않아 영향이 작고,
        // 판이 채워질수록 점점 중요해져서 자연스럽게 "영역을 넓히는" 수를 선호하게 된다.
        const scoreNow = computePlayScore(result.board);
        const myArea = color === 'black' ? scoreNow.blackScore : scoreNow.whiteScore;
        const oppArea = color === 'black' ? scoreNow.whiteScore : scoreNow.blackScore;
        score += (myArea - oppArea) * 1.5;

        // 내 돌 근처(반경 2칸 이내)에 두면 가산점 - 외톨이 수를 줄이고 모양을 이어가게 한다.
        let nearOwnStone = false;
        for (let dy = -2; dy <= 2 && !nearOwnStone; dy++) {
            for (let dx = -2; dx <= 2; dx++) {
                const nx = x + dx, ny = y + dy;
                if (!playInBounds(nx, ny)) continue;
                if (board[ny][nx] === color) { nearOwnStone = true; break; }
            }
        }
        if (nearOwnStone) score += 2;

        // 초반(돌이 10개 미만)에는 1선(가장자리)을 피하고 화점 근처를 선호한다.
        if (countStonesOnBoard(board) < 10) {
            const edgeDist = Math.min(x, y, 8 - x, 8 - y);
            if (edgeDist === 0) score -= 4;
            const starDist = Math.min(...AI_STAR_POINTS.map(([sx, sy]) => Math.abs(sx - x) + Math.abs(sy - y)));
            score += Math.max(0, 3 - starDist);
        }

        if (difficulty === 'high') {
            // 고수는 한 수 더 내다본다: 이 수를 둔 뒤 상대가 무언가를 잡아갈 수 있는지 확인해서 감점한다.
            let worstOpponentCapture = 0;
            listLegalMoves(result.board, opponent).forEach(m => {
                const reply = tryPlayMove(result.board, m.x, m.y, opponent);
                if (reply.ok) worstOpponentCapture = Math.max(worstOpponentCapture, reply.captured.length);
            });
            score -= worstOpponentCapture * 9;
        }
        return score;
    }

    // 판을 봐서 "이미 확정된 내 집" / "이미 확정된 상대 집" 좌표 집합을 만든다. 이 두 정보로
    // AI가 (1) 잡는 것도 없이 자기 집을 그냥 메우는 수와 (2) 뻔히 잡아먹힐 상대 집 침입을
    // 피하게 한다 - 종국 무렵 "둘 곳이 없어서 아무 데나 두는" 기본적으로 어긋난 행동을 막는다.
    function computeTerritoryOwnership(board, color) {
        const opponent = color === 'black' ? 'white' : 'black';
        const t = computePlayScore(board);
        const mySet = new Set(), oppSet = new Set();
        t.territoryCells.forEach(c => {
            (c.side === color ? mySet : oppSet).add(c.x + '_' + c.y);
        });
        return { mySet, oppSet };
    }

    function aiChooseMove(board, color, difficulty, koBoard) {
        const moves = listLegalMoves(board, color, koBoard);
        if (moves.length === 0) return null;

        // computePlayScore의 "집" 판정은 "이 빈 구역이 한쪽 색에만 닿아있는가"만 본다 - 바둑판이
        // 거의 비어있는 초반에는(예: 상대가 방금 첫 수를 뒀을 뿐) 아직 아무도 안 가본 것뿐인
        // 빈 공간 전체가 "상대 집"으로 잘못 잡힌다(내 돌이 하나도 없으니 그 무엇과도 안 닿을 뿐).
        // 실제로 경계가 만들어졌을 법한 후반부(돌이 어느 정도 쌓인 뒤)에만 이 판정을 신뢰해서
        // 자기 집 메우기/헛된 침입 방지 로직을 켠다 - 그래야 초반 수까지 이유 없이 패스하지 않는다.
        const isLateGame = countStonesOnBoard(board) >= 20;
        let myTerritorySet = new Set(), oppTerritorySet = new Set();
        if (isLateGame) {
            ({ mySet: myTerritorySet, oppSet: oppTerritorySet } = computeTerritoryOwnership(board, color));
        }
        // 잡는 것도 없이 (1) 이미 확정된 내 집을 그냥 메우거나 (2) 완전히 둘러싸여 확정된 상대
        // 집에 들어가는 수는 후보에서 아예 뺀다. 두 경우 다 순전히 손해이거나(내 집 1개를 스스로
        // 없앰) 애초에 이어질 아군이 전혀 없어 뻔히 잡아먹히는 수라서, 다른 둘 곳이 남아있는 한
        // 난이도와 무관하게 제외한다 - "약한 수"가 아니라 "말이 안 되는 수"이기 때문이다.
        const productiveMoves = moves.filter(m => {
            const key = m.x + '_' + m.y;
            if (!myTerritorySet.has(key) && !oppTerritorySet.has(key)) return true;
            return tryPlayMove(board, m.x, m.y, color).captured.length > 0;
        });
        const candidateMoves = productiveMoves.length > 0 ? productiveMoves : moves;

        if (difficulty === 'beginner0') {
            return candidateMoves[randInt(0, candidateMoves.length - 1)];
        }
        if (difficulty === 'beginner') {
            const capturing = candidateMoves.filter(m => tryPlayMove(board, m.x, m.y, color).captured.length > 0);
            const safe = candidateMoves.filter(m => {
                const r = tryPlayMove(board, m.x, m.y, color);
                const g = getGroupAndLiberties(r.board, m.x, m.y);
                return g.liberties > 1 || r.captured.length > 0;
            });
            const pool = capturing.length > 0 ? capturing : (safe.length > 0 ? safe : candidateMoves);
            // 무작위로 고르지 않고 그 안에서 그나마 나은 수를 고른다(사다리/단수 구원 판단은 없음 - 그래도
            // 왕초보보다는 낫고 중수보다는 뚜렷하게 약하도록 남겨둔다).
            const scoredPool = pool.map(m => ({ m: m, s: evaluateAiMove(board, m.x, m.y, color, difficulty, null, oppTerritorySet, myTerritorySet) }));
            scoredPool.sort((a, b) => b.s - a.s);
            // 남은 수가 전부 뻔한 침입/손해뿐이면(점수가 뚜렷하게 마이너스면) 그냥 차례를 넘긴다.
            if (scoredPool[0].s < -15) return null;
            const bestPoolScore = scoredPool[0].s;
            const bestPool = scoredPool.filter(c => c.s === bestPoolScore).map(c => c.m);
            return bestPool[randInt(0, bestPool.length - 1)];
        }

        // 중수 / 고수 공통: 이미 단수인 내 무리를 먼저 한 번만 계산해두고(후보마다 반복하면 비싸다),
        // 모든 후보 수를 평가해서 점수순으로 정렬한다.
        const myAtariLibertyPoints = findAtariLibertyPoints(board, color);
        const scored = shuffle(candidateMoves).map(m => ({ m: m, s: evaluateAiMove(board, m.x, m.y, color, difficulty, myAtariLibertyPoints, oppTerritorySet, myTerritorySet) }));
        scored.sort((a, b) => b.s - a.s);

        // 가장 좋다는 수조차 뚜렷한 손해(자기 집 메우기/헛된 침입 등)뿐이면, 그 수를 두지 않고
        // 차례를 넘긴다 - 두 번 연속 패스되면 대국이 자동으로 끝난다(playPass 참고).
        if (scored[0].s < -15) return null;

        if (difficulty === 'mid') {
            const bestScore = scored[0].s;
            const best = scored.filter(c => c.s === bestScore).map(c => c.m);
            return best[randInt(0, best.length - 1)];
        }

        // 고수: 정적 평가 상위 후보들만 골라, 상대의 최선 응수까지 둬본 뒤(2수 내다보기)
        // 그 결과 집 차이가 가장 좋은 수를 고른다 - 단순 반응이 아니라 실제로 "내다보고" 둔다.
        const opponent = color === 'black' ? 'white' : 'black';
        const topCandidates = scored.slice(0, Math.min(6, scored.length));
        let bestMove = topCandidates[0].m, bestFinalScore = -Infinity;
        topCandidates.forEach(({ m }) => {
            const afterMe = tryPlayMove(board, m.x, m.y, color).board;
            const oppReply = aiChooseMove(afterMe, opponent, 'mid');
            const afterOpp = oppReply ? tryPlayMove(afterMe, oppReply.x, oppReply.y, opponent).board : afterMe;
            const finalScoreBoard = computePlayScore(afterOpp);
            const myArea = color === 'black' ? finalScoreBoard.blackScore : finalScoreBoard.whiteScore;
            const oppArea = color === 'black' ? finalScoreBoard.whiteScore : finalScoreBoard.blackScore;
            const finalScore = (myArea - oppArea) + randInt(0, 1);
            if (finalScore > bestFinalScore) { bestFinalScore = finalScore; bestMove = m; }
        });
        return bestMove;
    }

    /* ---------- 신경망 기반 AI ("프로" 난이도) ----------
     * KataGo 공식 학습 체크포인트(kata1-b18c384nbt)를 9x9용으로 변환한 신경망을 브라우저에서
     * 그대로 돌린다(onnxruntime-web, WASM 백엔드). 몬테카를로 탐색 없이 정책망 순전파 결과만
     * 쓰기 때문에 곧바로(대략 0.1~1초) 응답하지만, 그만큼 아주 깊은 수읽기에서는 가끔 실수할
     * 수도 있다 - 그래도 기존 규칙기반 난이도들보다 훨씬 폭넓고 자연스러운 감각으로 둔다.
     * lib/katago-b18c384nbt-9x9.onnx / lib/katago-b18c384nbt-9x9.LICENSE.txt 참고. */
    const KATA_N = 9;
    const KATA_PASS_INDEX = KATA_N * KATA_N;
    let kataSessionPromise = null;
    function ensureKataSession() {
        if (!kataSessionPromise) kataSessionPromise = ort.InferenceSession.create('./lib/katago-b18c384nbt-9x9.onnx');
        return kataSessionPromise;
    }

    // (x,y)가 아군/상대 어느 쪽이든 사다리로 확실히 잡히는 무리에 속해 있으면 plane에 표시한다.
    // KataGo 공식 사다리 피처(입력 채널 14~16)의 근사치로, 앱에 이미 있는 readLadder를 그대로 쓴다.
    function kataMarkLadderPlane(board, plane) {
        const seen = new Set();
        for (let y = 0; y < KATA_N; y++) for (let x = 0; x < KATA_N; x++) {
            const color = board[y][x];
            if (!color) continue;
            const k = x + '_' + y;
            if (seen.has(k)) continue;
            const g = getGroupAndLiberties(board, x, y);
            g.stones.forEach(([sx, sy]) => seen.add(sx + '_' + sy));
            if (g.liberties !== 1 && g.liberties !== 2) continue;
            const chaser = color === 'black' ? 'white' : 'black';
            if (readLadder(board, x, y, chaser)) {
                g.stones.forEach(([sx, sy]) => { plane[sy * KATA_N + sx] = 1; });
            }
        }
    }

    // board에서 pla가 (x,y)에 두면 koBoard를 그대로 재현해서 막히는 유일한 지점(패)을 찾는다.
    function kataFindSimpleKoPoint(board, pla, koBoard) {
        if (!koBoard) return null;
        for (let y = 0; y < KATA_N; y++) for (let x = 0; x < KATA_N; x++) {
            if (board[y][x] !== 0) continue;
            const r = tryPlayMove(board, x, y, pla, koBoard);
            if (!r.ok && r.reason === 'ko') return { x, y };
        }
        return null;
    }

    // playHistory/playLastMove/playConsecutivePasses(전역 대국 상태)를 KataGo가 기대하는
    // "최근 N수" 목록으로 바꾼다. playPass는 playLastMove를 안 건드리므로(마지막 실제 착수
    // 지점만 계속 들고 있음), 각 수가 패였는지는 스냅샷 간 passes 카운터 증가로 판단한다.
    function kataExtractRecentPlies(maxPlies) {
        const numPlies = playHistory.length;
        if (numPlies === 0) return [];
        const entries = playHistory.concat([{ lastMove: playLastMove, passes: playConsecutivePasses }]);
        const start = Math.max(0, numPlies - maxPlies);
        const plies = [];
        for (let k = start; k < numPlies; k++) {
            const wasPass = entries[k + 1].passes > entries[k].passes;
            const loc = wasPass ? null : entries[k + 1].lastMove;
            plies.push({ loc });
        }
        return plies;
    }

    // board/pla/koBoard로부터 KataGo 신경망 입력 텐서(22채널 평면 + 19 전역 피처)를 만든다.
    // python/katago/game/features.py의 fill_row_features를 그대로 옮긴 것이며, 사다리(14~16)와
    // 집 소유권(18~19)만 앱에 이미 있는 근사 로직(readLadder/computeTerritoryOwnership)을 쓴다.
    function buildKataInputs(board, pla, koBoard) {
        const opp = pla === 'black' ? 'white' : 'black';
        const bin = Array.from({ length: 22 }, () => new Float32Array(KATA_N * KATA_N));
        const glob = new Float32Array(19);

        for (let y = 0; y < KATA_N; y++) for (let x = 0; x < KATA_N; x++) {
            const pos = y * KATA_N + x;
            bin[0][pos] = 1.0;
            const stone = board[y][x];
            if (stone === pla) bin[1][pos] = 1.0;
            else if (stone === opp) bin[2][pos] = 1.0;
            if (stone === pla || stone === opp) {
                const g = getGroupAndLiberties(board, x, y);
                if (g.liberties === 1) bin[3][pos] = 1.0;
                else if (g.liberties === 2) bin[4][pos] = 1.0;
                else if (g.liberties === 3) bin[5][pos] = 1.0;
            }
        }

        const koPoint = kataFindSimpleKoPoint(board, pla, koBoard);
        if (koPoint) bin[6][koPoint.y * KATA_N + koPoint.x] = 1.0;

        const recent = kataExtractRecentPlies(5).reverse(); // recent[0] = 가장 최근 수
        const chIdx = [9, 10, 11, 12, 13];
        recent.forEach((ply, i) => {
            if (ply.loc) bin[chIdx[i]][ply.loc.y * KATA_N + ply.loc.x] = 1.0;
            else glob[i] = 1.0;
        });

        kataMarkLadderPlane(board, bin[14]);
        const prevBoard = playHistory.length > 0 ? playHistory[playHistory.length - 1].board : null;
        const prevPrevBoard = playHistory.length > 1 ? playHistory[playHistory.length - 2].board : null;
        kataMarkLadderPlane(prevBoard || board, bin[15]);
        kataMarkLadderPlane(prevPrevBoard || prevBoard || board, bin[16]);

        const { mySet, oppSet } = computeTerritoryOwnership(board, pla);
        for (let y = 0; y < KATA_N; y++) for (let x = 0; x < KATA_N; x++) {
            const pos = y * KATA_N + x;
            const key = x + '_' + y;
            if (board[y][x] === pla || mySet.has(key)) bin[18][pos] = 1.0;
            else if (board[y][x] === opp || oppSet.has(key)) bin[19][pos] = 1.0;
        }

        glob[14] = 1.0; // passWouldEndPhase (이 앱은 앙코르 없는 지역 계가 규칙을 쓴다)
        // glob[5](자기 덤)/glob[6..13,15..17](패 규칙 종류·수이사이·지역계가 세부 규칙)은 이 앱에
        // 해당 없어 0으로 둔다. glob[18]("wave")도 덤 0 기준으로 공식대로 계산하면 늘 0이라 생략한다.

        const binFlat = new Float32Array(22 * KATA_N * KATA_N);
        for (let c = 0; c < 22; c++) binFlat.set(bin[c], c * KATA_N * KATA_N);
        return { binFlat, glob };
    }

    // 신경망 정책 출력(정책 헤드는 6종류 중 0번이 실제 착수 정책)을 소프트맥스한 뒤, 지금 판에서
    // 실제로 합법인 수들로만 후보를 추려 그중 확률이 높은 몇 곳 중 하나를 가중치대로 고른다.
    async function aiChooseMoveNeural(board, color, koBoard) {
        const session = await ensureKataSession();
        const { binFlat, glob } = buildKataInputs(board, color, koBoard);
        const feeds = {
            bin_input: new ort.Tensor('float32', binFlat, [1, 22, KATA_N, KATA_N]),
            global_input: new ort.Tensor('float32', glob, [1, 19]),
        };
        const results = await session.run(feeds);
        const numMoves = KATA_N * KATA_N + 1;
        const head0 = results.policy.data.slice(0, numMoves); // [1,6,82]에서 0번 헤드(착수 정책)만
        const maxLogit = Math.max(...head0);
        const exps = Array.from(head0, v => Math.exp(v - maxLogit));
        const sumExp = exps.reduce((a, b) => a + b, 0);
        const probs = exps.map(v => v / sumExp);

        const legalMoves = listLegalMoves(board, color, koBoard);
        const legalSet = new Set(legalMoves.map(m => m.x + '_' + m.y));
        const candidates = [];
        for (let y = 0; y < KATA_N; y++) for (let x = 0; x < KATA_N; x++) {
            if (!legalSet.has(x + '_' + y)) continue;
            candidates.push({ move: { x, y }, p: probs[y * KATA_N + x] });
        }
        candidates.push({ move: null, p: probs[KATA_PASS_INDEX] }); // 패
        candidates.sort((a, b) => b.p - a.p);

        // 확률 상위 몇 곳 중 하나를 가중치대로 뽑는다(매번 완전히 같은 수만 반복하지 않도록).
        const top = candidates.slice(0, Math.min(3, candidates.length));
        const topSum = top.reduce((s, c) => s + c.p, 0);
        let r = Math.random() * topSum;
        for (const c of top) {
            r -= c.p;
            if (r <= 0) return c.move;
        }
        return top[0].move;
    }

    async function aiTakeTurn() {
        if (playGameEnded || playMode !== 'ai' || playTurn !== 'white') return;
        const koBoard = playHistory.length > 0 ? playHistory[playHistory.length - 1].board : null;
        if (playAiDifficulty === 'pro') {
            document.getElementById('play-message').innerText = 'AI가 생각하고 있어요... 🤔';
            let move;
            try {
                move = await aiChooseMoveNeural(playBoard, 'white', koBoard);
            } catch (e) {
                console.error('신경망 AI 실행 중 오류 - 규칙기반 AI로 대신 둡니다:', e);
                move = aiChooseMove(playBoard, 'white', 'high', koBoard);
            }
            document.getElementById('play-message').innerText = '';
            if (playGameEnded || playMode !== 'ai' || playTurn !== 'white') return; // 생각하는 동안 상황이 바뀌면 무시
            if (!move) { playPass(true); return; }
            attemptPlayMove(move.x, move.y);
            return;
        }
        const move = aiChooseMove(playBoard, 'white', playAiDifficulty, koBoard);
        if (!move) { playPass(true); return; }
        attemptPlayMove(move.x, move.y);
    }

    // 레벨테스트의 백돌 AI - "고수" 난이도 규칙기반 엔진을 그대로 쓴다(잡을 수 있으면 바로 잡고,
    // 단수에 몰리면 도망치는 판단을 이미 하고 있어서 "살아남으려 애쓰는 백돌" 역할에 잘 맞는다).
    // 레벨테스트 백돌 전용 "생존 AI" - 일반 aiChooseMove(고수)는 판 전체의 집 계산까지 신경 쓰다
    // 보니 이런 국지전에서 화점 근처 같은 엉뚱한 곳에 두는 경우가 있었다. 이 전용 AI는 다음
    // 우선순위를 그대로 따른다:
    //   1) 지금 당장 단수인 흑 무리가 있으면(도망칠 필요와 무관하게) 무조건 그것부터 잡는다.
    //   2) 이미 확정된 자기 눈(홑눈) 자리는 절대 스스로 메우지 않는다.
    //   3) 한 수로 눈이 2개 이상 완성되면(=확정 생존) 그 수를 바로 둔다.
    //   4) 사다리로 결국 잡히지 않는 수만 후보로 남기고, 그중 눈을 만들거나 눈 개수를 늘리는
    //      수를 최우선한다 - "넓은 쪽에 집을 2채 이상 만들어 살아남으려는" 목표.
    //   5) 눈 개수가 같으면, 백 자신의 활로를 가장 많이 남기는 수를 고른다 - 항상 붙어서 둔다.
    //   6) 활로도 같으면, 흑을 단수로 몰 수 있는 쪽(도망+반격 겸함)을 우선한다.
    //   7) 그래도 여러 곳이 남으면, 주변이 더 넓게 트인 쪽(구석/막다른 곳 아닌 쪽)으로 도망친다.

    // 백에게 완전히 둘러싸인 "홑눈" 자리(존재하는 이웃이 전부 백돌)를 모두 찾는다 - 흑이 거기
    // 두면 곧바로 자충수라 진짜로 안전한 눈이다. 2개 이상이면 백은 무조건 산다(2눈 생존).
    function levelTestSingleEyePoints(board) {
        const eyes = [];
        for (let y = 0; y < 9; y++) for (let x = 0; x < 9; x++) {
            if (board[y][x] !== 0) continue;
            const ns = playNeighbors(x, y);
            if (ns.length > 0 && ns.every(([nx, ny]) => board[ny][nx] === 'white')) eyes.push([x, y]);
        }
        return eyes;
    }

    // 지금 당장 활로 1개(단수)인 흑 무리가 있고 그 자리에 두는 게 합법이면 그 지점을 돌려준다.
    function levelTestFindImmediateCapture(board, koBoard) {
        const seen = new Set();
        for (let y = 0; y < 9; y++) for (let x = 0; x < 9; x++) {
            if (board[y][x] !== 'black') continue;
            const k = x + '_' + y;
            if (seen.has(k)) continue;
            const g = getGroupAndLiberties(board, x, y);
            g.stones.forEach(([sx, sy]) => seen.add(sx + '_' + sy));
            if (g.liberties === 1) {
                const [lx, ly] = g.libertyPoints[0];
                if (tryPlayMove(board, lx, ly, 'white', koBoard).ok) return { x: lx, y: ly };
            }
        }
        return null;
    }
    // 이 수를 둔 뒤의 판에 활로 1개(단수)인 흑 무리가 하나라도 남는지 - 도망가면서 반격까지
    // 되는 길인지 확인한다.
    function levelTestCreatesBlackAtari(board) {
        const seen = new Set();
        for (let y = 0; y < 9; y++) for (let x = 0; x < 9; x++) {
            if (board[y][x] !== 'black') continue;
            const k = x + '_' + y;
            if (seen.has(k)) continue;
            const g = getGroupAndLiberties(board, x, y);
            g.stones.forEach(([sx, sy]) => seen.add(sx + '_' + sy));
            if (g.liberties === 1) return true;
        }
        return false;
    }
    // (x,y) 주변 반경 2칸 안의 빈 칸 개수 - "이 방향이 얼마나 트여있는지"의 간단한 근사치.
    function levelTestOpenness(board, x, y) {
        let n = 0;
        for (let dy = -2; dy <= 2; dy++) for (let dx = -2; dx <= 2; dx++) {
            const nx = x + dx, ny = y + dy;
            if (!playInBounds(nx, ny)) continue;
            if (board[ny][nx] === 0) n++;
        }
        return n;
    }
    function levelTestChooseWhiteMove(board, koBoard) {
        const immediateCapture = levelTestFindImmediateCapture(board, koBoard);
        if (immediateCapture) return immediateCapture;

        const seenWhite = new Set();
        const libertyPoints = new Map();
        for (let y = 0; y < 9; y++) for (let x = 0; x < 9; x++) {
            if (board[y][x] !== 'white') continue;
            const k = x + '_' + y;
            if (seenWhite.has(k)) continue;
            const g = getGroupAndLiberties(board, x, y);
            g.stones.forEach(([sx, sy]) => seenWhite.add(sx + '_' + sy));
            g.libertyPoints.forEach(([lx, ly]) => libertyPoints.set(lx + '_' + ly, [lx, ly]));
        }
        // 이미 확정된 홑눈 자리는 절대 스스로 메우지 않는다 - 다른 둘 곳이 정말 없을 때만 예외.
        const confirmedEyes = new Set(levelTestSingleEyePoints(board).map(([x, y]) => x + '_' + y));
        let candidates = [...libertyPoints.values()].filter(([x, y]) => !confirmedEyes.has(x + '_' + y) && tryPlayMove(board, x, y, 'white', koBoard).ok);
        if (candidates.length === 0) candidates = [...libertyPoints.values()].filter(([x, y]) => tryPlayMove(board, x, y, 'white', koBoard).ok);
        if (candidates.length === 0) return null;

        const evaluated = candidates.map(([x, y]) => {
            const result = tryPlayMove(board, x, y, 'white', koBoard);
            const newGroup = getGroupAndLiberties(result.board, x, y);
            const laddered = newGroup.liberties <= 2 && readLadder(result.board, x, y, 'black');
            const eyeCount = levelTestSingleEyePoints(result.board).length;
            return { x, y, liberties: newGroup.liberties, laddered, atari: levelTestCreatesBlackAtari(result.board), openness: levelTestOpenness(result.board, x, y), eyeCount };
        });
        // 이 수 하나로 눈이 2개 이상 완성되면(확정 생존) 바로 그 수를 둔다.
        const winning = evaluated.filter(e => e.eyeCount >= 2);
        if (winning.length > 0) { const w = winning[randInt(0, winning.length - 1)]; return { x: w.x, y: w.y }; }
        const safe = evaluated.filter(e => !e.laddered);
        const pool = safe.length > 0 ? safe : evaluated;
        // 눈을 만들거나 눈 개수를 늘리는 수를 최우선한다 - "넓은 쪽에 집을 만들어 살아남는" 목표.
        const maxEyes = Math.max(...pool.map(e => e.eyeCount));
        const eyePool = pool.filter(e => e.eyeCount === maxEyes);
        const maxLibs = Math.max(...eyePool.map(e => e.liberties));
        const best = eyePool.filter(e => e.liberties === maxLibs);
        const atariBest = best.filter(e => e.atari);
        const finalPool = atariBest.length > 0 ? atariBest : best;
        const maxOpen = Math.max(...finalPool.map(e => e.openness));
        const openest = finalPool.filter(e => e.openness === maxOpen);
        const pick = openest[randInt(0, openest.length - 1)];
        return { x: pick.x, y: pick.y };
    }

    function levelTestAiTakeTurn() {
        if (playGameEnded || playMode !== 'leveltest' || playTurn !== 'white') return;
        const koBoard = playHistory.length > 0 ? playHistory[playHistory.length - 1].board : null;
        const move = levelTestChooseWhiteMove(playBoard, koBoard);
        if (!move) { levelTestEndGame(true); return; } // 더 둘 곳이 없다 = 도망갈 수 없으니 사실상 유저 승리
        attemptPlayMove(move.x, move.y);
    }

    function levelTestEndGame(won) {
        playGameEnded = true;
        if (won) {
            const character = getActiveCharacter();
            if (character) {
                character.levelTestsWon = character.levelTestsWon || {};
                character.levelTestsWon[levelTestTopicKey] = true;
                saveProfile();
            }
        }
        document.getElementById('play-end-summary').innerHTML = won
            ? `<div class="modal-winner-row">🎉 백돌을 모두 잡았어요! 레벨테스트 성공!</div>
               <div class="modal-score-row">다음 레벨이 열렸어요! ⭐</div>`
            : `<div class="modal-winner-row">😢 백돌이 활로를 찾아 살아남았어요.</div>
               <div class="modal-score-row">다시 도전해보세요!</div>`;
        document.getElementById('play-end-popup').classList.add('active');
    }

    buildHomeScreen();
</script>

</body>
