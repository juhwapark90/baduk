<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">

    <title>어린이 바둑교실: 주제별 마스터</title>
    <script>
    (function () {
        // 카카오톡 인앱 브라우저는 구글 로그인을 정책상 막기 때문에 외부 브라우저로 내보낸다.
        var isKakao = /KAKAOTALK/i.test(navigator.userAgent || '');
        if (!isKakao) return;

        location.href = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(location.href);

        // 위 스킴 리다이렉트가 동작하지 않는 환경(iOS 등)을 대비한 안내 배너
        document.addEventListener('DOMContentLoaded', function () {
            var banner = document.createElement('div');
            banner.id = 'kakao-fallback-banner';
            banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;'
                + 'background:#fee500;color:#3c1e1e;padding:12px 16px;font-size:14px;'
                + 'line-height:1.5;font-weight:bold;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,0.2);';
            banner.innerHTML = '⚠️ 카카오톡에서는 구글 로그인이 되지 않아요!<br>'
                + '오른쪽 아래(또는 위) <b>≡ 메뉴 → "다른 브라우저로 열기"</b>를 눌러주세요.';
            document.body.prepend(banner);
            document.body.style.paddingTop = (banner.offsetHeight + 10) + 'px';
        });
    })();
    </script>
    <style>

        .result-btns button { flex: 1; }

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
    /* =========================================================
       Firebase 로그인 및 기록 저장
    ========================================================= */
    const firebaseConfig = {
        apiKey: "AIzaSyAnSAHtjJBprCaDAVJbR3arKpBXNe1fJes",
        authDomain: "baduk-6654f.firebaseapp.com",
        projectId: "baduk-6654f",
        storageBucket: "baduk-6654f.firebasestorage.app",
        messagingSenderId: "791976191162",
        appId: "1:791976191162:web:bd636f60f2524a96590e83"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let profile = { characters: [], activeCharacterId: null };

    function signInGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).catch(err => {
            const isInAppBrowserError =
                err.code === 'auth/operation-not-supported-in-this-environment' ||
                (err.message && err.message.includes('disallowed_useragent'));
            if (isInAppBrowserError) {
                alert('카카오톡, 인스타그램 등 앱 내부 브라우저에서는 구글 로그인이 지원되지 않아요.\n' +
                    '크롬이나 사파리 같은 일반 브라우저로 열어서 다시 시도해주세요.');
            } else {
                alert('로그인에 실패했어요: ' + err.message);
            }
        });
    }
    function signOutUser() { auth.signOut(); }

    // 레벨 = 목차의 원기호 번호 순서 그대로. 각 레벨의 점수는 매번 새로 도전할 때마다
    // 그 판의 점수(100점 만점)로 갱신되는 "최고 기록"이며, 이전 점수에 더해지지 않는다.
    // 최고 기록이 CLEAR_THRESHOLD 이상이면 클리어로 인정하고 다음 레벨이 열린다.
    const SCORE_MAX = 100;
    const CLEAR_THRESHOLD = 90;

    // 예전 누적 방식으로 저장돼 100점을 넘는 값이 남아있을 수 있으므로 항상 100점 상한으로 읽는다.
    function topicPoints(record) {
        return Math.min(SCORE_MAX, (record && record.points) || 0);
    }

    function isTopicUnlocked(idx, character) {
        if (idx === 0) return true;
        const prevRecord = character.topics[TOPICS[idx - 1].key];
        return topicPoints(prevRecord) >= CLEAR_THRESHOLD;
    }

    function countClearedTopics(character) {
        if (!character) return 0;
        return TOPICS.filter(t => topicPoints(character.topics[t.key]) >= CLEAR_THRESHOLD).length;
    }

    // 캐릭터 전체 레벨 = 클리어한 레벨 수 + 1 (지금 도전 중인 레벨 번호)
    function characterLevel(character) {
        if (!character) return 1;
        return Math.min(countClearedTopics(character) + 1, TOPICS.length);
    }

    // 이 기능 이전에 저장된 예전 형식(uid 문서 바로 아래에 주제별 기록)을 캐릭터 1명으로 이전한다.
    function migrateLegacyProgress(data) {
        if (data.characters) return data;
        const topicKeys = new Set(TOPICS.map(t => t.key));
        const legacyTopics = {};
        let totalEarned = 0;
        Object.keys(data).forEach(k => {
            if (topicKeys.has(k) && data[k] && typeof data[k] === 'object') {
                legacyTopics[k] = data[k];
                totalEarned += data[k].points || 0;
            }
        });
        if (Object.keys(legacyTopics).length === 0) {
            return { characters: [], activeCharacterId: null };
        }
        const character = {
            id: 'char_legacy', name: '바둑이', age: null, gender: 'none', avatar: '🧑',
            equipped: { hat: null, glasses: null, extra: null }, owned: [],
            wallet: totalEarned, totalEarned: totalEarned, topics: legacyTopics
        };

    // 저장은 즉시 반영(로컬)하고 Firestore 쓰기는 비동기로 흘려보낸다.
    // roundScore/roundMax(원점수, 만점)를 100점 만점으로 환산한 뒤, 그 레벨의 "최고 기록"과 비교해
    // 더 높을 때만 갱신한다(누적 합산이 아님). 방금 처음으로 클리어 기준을 넘겼는지도 함께 반환.
    function saveTopicResult(topicKey, roundScore, roundMax) {
        const character = getActiveCharacter();
        if (!currentUser || !character) return null;
        const prevRecord = character.topics[topicKey];
        const prevBest = topicPoints(prevRecord);
        const scaledScore = Math.min(SCORE_MAX, Math.round((roundScore / roundMax) * SCORE_MAX));
        const newBest = Math.max(prevBest, scaledScore);
        character.topics[topicKey] = {
            total: SCORE_MAX,
            cleared: newBest >= CLEAR_THRESHOLD,
            points: newBest,
            lastPlayed: Date.now()
        };
        // 상점 화폐(지갑)와 캐릭터 전체 누적 통계는 매 판 얻은 원점수를 계속 쌓는다 (레벨 클리어 기준과는 별개).
        character.totalEarned = (character.totalEarned || 0) + roundScore;
        character.wallet = (character.wallet || 0) + roundScore;
        saveProfile();
        const justCleared = prevBest < CLEAR_THRESHOLD && newBest >= CLEAR_THRESHOLD;
        return { justCleared, newCharacterLevel: characterLevel(character), scaledScore };
    }

    const BOARD_SIZE = 9;
    const CELL_SIZE = 40;
    const OFFSET = 20;

    let problemsList = [];
    let currentProblemIndex = 0;
    let userMarks = [];
    let isProblemSolved = false;
    let totalScore = 0;
    let currentMistakes = 0;
    let currentTopicKey = null;

    /* =========================================================
       공통 유틸리티
    ========================================================= */
    function inBounds(x, y) { return x >= 0 && x <= 8 && y >= 0 && y <= 8; }
    function neighbors4(x, y) {
        return [[x-1,y],[x+1,y],[x,y-1],[x,y+1]].filter(p => inBounds(p[0], p[1]));
    }
    function key(x, y) { return x + '_' + y; }
    function randInt(a, b) { return a + Math.floor(Math.random() * (b - a + 1)); }
    function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            let j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // 연결된 돌 무리를 무작위로 성장시킨다 (occupied 셀은 피해서 자람)
    function growGroup(occupied, size, startX, startY) {
        let stones = [[startX, startY]];
        let stoneSet = new Set([key(startX, startY)]);
        while (stones.length < size) {
            let candidates = [];
            stones.forEach(([sx, sy]) => {
                neighbors4(sx, sy).forEach(([nx, ny]) => {
                    let k = key(nx, ny);
                    if (!stoneSet.has(k) && !occupied.has(k)) candidates.push([nx, ny]);
                });
            });
            if (candidates.length === 0) break;
            let pick = candidates[Math.floor(Math.random() * candidates.length)];
            stones.push(pick);
            stoneSet.add(key(pick[0], pick[1]));
        }
        return stones;
    }

    // 돌 무리의 활로(빈 이웃) 계산
    function computeLibs(stones, occSet) {
        let map = {};
        stones.forEach(([x, y]) => {
            neighbors4(x, y).forEach(([nx, ny]) => {
                let k = key(nx, ny);
                if (!occSet.has(k)) map[k] = [nx, ny];
            });
        });
        return Object.values(map);
    }

    // 지정된 활로 개수를 갖도록 돌 무리를 만든 후, 남길 활로/막을 활로를 나눠 반환
    function makeGroupWithLiberties(size, targetLibs, region) {
        region = region || { minX: 1, maxX: 7, minY: 1, maxY: 7 };
        for (let a = 0; a < 80; a++) {
            let sx = randInt(region.minX, region.maxX), sy = randInt(region.minY, region.maxY);
            let occ = new Set([key(sx, sy)]);
            let stones = growGroup(occ, size, sx, sy);
            if (stones.length < size) continue;
            let occ2 = new Set(stones.map(([x, y]) => key(x, y)));
            let libs = computeLibs(stones, occ2);
            if (libs.length < targetLibs) continue;
            shuffle(libs);
            let keep = libs.slice(0, targetLibs), block = libs.slice(targetLibs);
            return { stones, keep, block };
        }
        return null;
    }

    function toObjArr(arr) { return arr.map(([x, y]) => ({ x, y })); }

    /* =========================================================
       ① 활로찾기
    ========================================================= */
    function genLiberty(size) {
        let sx = randInt(1, 7), sy = randInt(1, 7);
        let occ = new Set([key(sx, sy)]);
        let stones = growGroup(occ, size, sx, sy);
        let occ2 = new Set(stones.map(([x, y]) => key(x, y)));
        let libs = computeLibs(stones, occ2);
        return {
            type: 'mark_multiple',
            blackStones: toObjArr(stones),
            whiteStones: [],
            answers: toObjArr(libs),
            desc: `표시된 흑돌${size > 1 ? '들' : ''}의 활로(숨구멍)를 모두 찾아 표시하세요!`
        };
    }

    /* =========================================================
       ② 단수의 기술
    ========================================================= */
    function genAtari(size) {
        let r = makeGroupWithLiberties(size, 2);
        if (!r) return genAtari(1);
        return {
            type: 'play_single',
            blackStones: toObjArr(r.block),
            whiteStones: toObjArr(r.stones),
            answers: toObjArr(r.keep),
            desc: '흰 돌을 단수칠 수 있는 자리를 찾아 흑돌을 놓아보세요! (활로를 1개로 줄이는 자리)'
        };
    }

    /* =========================================================
       ③ 따내기
    ========================================================= */
    function genCapture(size) {
        let r = makeGroupWithLiberties(size, 1);
        if (!r) return genCapture(1);
        return {
            type: 'play_single',
            blackStones: toObjArr(r.block),
            whiteStones: toObjArr(r.stones),
            answers: toObjArr(r.keep),
            desc: '단수에 몰린 흰 돌을 따낼 수 있는 자리를 찾아 흑돌을 놓아보세요!'
        };
    }

    /* =========================================================
       ⑤ 기본 살리기
    ========================================================= */
    function genRescue(size) {
        let r = makeGroupWithLiberties(size, 1);
        if (!r) return genRescue(1);
        return {
            type: 'play_single',
            blackStones: toObjArr(r.stones),
            whiteStones: toObjArr(r.block),
            answers: toObjArr(r.keep),
            desc: '앗! 흑돌이 단수에 몰렸어요. 살아남는 자리를 찾아보세요!'
        };
    }

    /* =========================================================
       ④ 돌의 연결과 끊음
    ========================================================= */
    function genConnectCut(size, mode) {
        for (let attempt = 0; attempt < 80; attempt++) {
            let px = randInt(2, 6), py = randInt(2, 6);
            let dirs = shuffle([[-1,0],[1,0],[0,-1],[0,1]]);
            let dirA = dirs[0], dirB = dirs[1];
            let startA = [px + dirA[0], py + dirA[1]];
            let startB = [px + dirB[0], py + dirB[1]];
            if (!inBounds(startA[0], startA[1]) || !inBounds(startB[0], startB[1])) continue;
            let occ = new Set([key(px, py)]);
            let groupA = growGroup(occ, size, startA[0], startA[1]);
            if (groupA.length < size) continue;
            let occ2 = new Set(groupA.map(([x, y]) => key(x, y)));
            groupA.forEach(([x, y]) => neighbors4(x, y).forEach(([nx, ny]) => occ2.add(key(nx, ny))));
            occ2.add(key(px, py));
            let groupB = growGroup(occ2, size, startB[0], startB[1]);
            if (groupB.length < size) continue;
            let stones = toObjArr([...groupA, ...groupB]);
            let isConnect = mode === 'connect';
            return {
                type: 'play_single',
                blackStones: isConnect ? stones : [],
                whiteStones: isConnect ? [] : stones,
                answers: [{ x: px, y: py }],
                desc: isConnect
                    ? '두 흑돌 그룹이 끊어지지 않도록 연결하는 자리를 찾아 흑돌을 놓아보세요!'
                    : '두 흰 돌 그룹을 서로 끊어놓는 자리를 찾아 흑돌을 놓아보세요!'
            };
        }
        return null;
    }

    /* =========================================================
       ⑥ 복단수
    ========================================================= */
    function genDoubleAtari(sizeA, sizeB) {
        for (let attempt = 0; attempt < 80; attempt++) {
            let px = randInt(2, 6), py = randInt(2, 6);
            let dirs = shuffle([[-1,0],[1,0],[0,-1],[0,1]]);
            let dirA = dirs[0], dirB = dirs[1];
            let startA = [px + dirA[0], py + dirA[1]];
            let startB = [px + dirB[0], py + dirB[1]];
            if (!inBounds(startA[0], startA[1]) || !inBounds(startB[0], startB[1])) continue;
            let occA = new Set([key(px, py)]);
            let groupA = growGroup(occA, sizeA, startA[0], startA[1]);
            if (groupA.length < sizeA) continue;
            let bufferA = new Set(groupA.map(([x, y]) => key(x, y)));
            groupA.forEach(([x, y]) => neighbors4(x, y).forEach(([nx, ny]) => bufferA.add(key(nx, ny))));
            bufferA.add(key(px, py));
            let groupB = growGroup(bufferA, sizeB, startB[0], startB[1]);
            if (groupB.length < sizeB) continue;

            let occA2 = new Set(groupA.map(([x, y]) => key(x, y)));
            let libsA = computeLibs(groupA, occA2).filter(([x, y]) => !(x === px && y === py));
            let occB2 = new Set(groupB.map(([x, y]) => key(x, y)));
            let libsB = computeLibs(groupB, occB2).filter(([x, y]) => !(x === px && y === py));
            if (libsA.length < 1 || libsB.length < 1) continue;
            shuffle(libsA); shuffle(libsB);
            let blockA = libsA.slice(1);
            let blockB = libsB.slice(1);

            let allWhite = [...groupA, ...groupB];
            let allBlack = [...blockA, ...blockB];
            let whiteKeys = new Set(allWhite.map(([x, y]) => key(x, y)));
            if (allBlack.some(([x, y]) => whiteKeys.has(key(x, y)))) continue;

            return {
                type: 'play_single',
                blackStones: toObjArr(allBlack),
                whiteStones: toObjArr(allWhite),
                answers: [{ x: px, y: py }],
                desc: '한 번의 수로 두 개의 흰 돌 무리를 동시에 단수칠 수 있는 자리를 찾아보세요! (복단수)'
            };
        }
        return null;
    }

    /* =========================================================
       ⑦ 연단수  /  ⑧ 축 (같은 엔진, 지역만 다르게)
    ========================================================= */
    function genAtariChaseCore(size, region, desc) {
        for (let attempt = 0; attempt < 80; attempt++) {
            let sx = randInt(region.minX, region.maxX), sy = randInt(region.minY, region.maxY);
            let occ = new Set([key(sx, sy)]);
            let stones = growGroup(occ, size, sx, sy);
            if (stones.length < size) continue;
            let occ2 = new Set(stones.map(([x, y]) => key(x, y)));
            let libs = computeLibs(stones, occ2);
            if (libs.length < 2) continue;
            shuffle(libs);
            let keep = libs.slice(0, 2), block = libs.slice(2);
            let [P1, P2] = keep;
            let d1 = Math.min(P1[0], 8 - P1[0], P1[1], 8 - P1[1]);
            let d2 = Math.min(P2[0], 8 - P2[0], P2[1], 8 - P2[1]);
            let correct = d1 <= d2 ? P1 : P2;
            let other = d1 <= d2 ? P2 : P1;
            let usedSet = new Set([
                ...occ2, ...block.map(([x, y]) => key(x, y)),
                key(correct[0], correct[1]), key(other[0], other[1])
            ]);
            let newN = neighbors4(other[0], other[1]).filter(([nx, ny]) => !usedSet.has(key(nx, ny)));
            shuffle(newN);
            let extraBlocks = newN.length >= 1 ? newN.slice(1) : [];
            let allBlack = [...block, ...extraBlocks];
            return {
                type: 'play_single',
                blackStones: toObjArr(allBlack),
                whiteStones: toObjArr(stones),
                answers: [{ x: correct[0], y: correct[1] }],
                desc
            };
        }
        return null;
    }

    function genChainAtari(size) {
        let region = { minX: 2, maxX: 6, minY: 2, maxY: 6 };
        let r = genAtariChaseCore(size, region,
            '흰 돌을 단수치면, 도망가도 계속 단수가 이어져서 결국 잡혀요! 그 자리를 찾아보세요! (연단수)');
        return r || genChainAtari(1);
    }

    function genLadder(size) {
        let edges = [
            { minX: 0, maxX: 1, minY: 1, maxY: 7 },
            { minX: 7, maxX: 8, minY: 1, maxY: 7 },
            { minX: 1, maxX: 7, minY: 0, maxY: 1 },
            { minX: 1, maxX: 7, minY: 7, maxY: 8 }
        ];
        let region = edges[randInt(0, 3)];
        let r = genAtariChaseCore(size, region,
            '흰 돌을 몰아서 도망갈 수 없게 만드는 단수 자리를 찾아보세요! (축의 원리: 가장자리 쪽으로 몰아야 해요)');
        return r || genLadder(1);
    }

    /* =========================================================
       템플릿 변환 도구 (회전/대칭/평행이동)
    ========================================================= */
    function rotPoint(x, y, rot) {
        switch (rot) {
            case 90: return [-y, x];
            case 180: return [-x, -y];
            case 270: return [y, -x];
            default: return [x, y];
        }
    }
    function transformCoords(list, rot, mirror) {
        return list.map(([x, y]) => {
            let px = mirror ? -x : x;
            return rotPoint(px, y, rot);
        });
    }
    function placeTemplate(bRel, wRel, aRel, extraRel) {
        extraRel = extraRel || [];
        let rot = [0, 90, 180, 270][randInt(0, 3)];
        let mirror = Math.random() < 0.5;
        let bT = transformCoords(bRel, rot, mirror);
        let wT = transformCoords(wRel, rot, mirror);
        let aT = transformCoords(aRel, rot, mirror);
        let exT = transformCoords(extraRel, rot, mirror);
        let all = [...bT, ...wT, ...aT, ...exT];
        let minX = Math.min(...all.map(p => p[0])), maxX = Math.max(...all.map(p => p[0]));
        let minY = Math.min(...all.map(p => p[1])), maxY = Math.max(...all.map(p => p[1]));
        let shiftX = randInt(0, 8 - (maxX - minX)) - minX;
        let shiftY = randInt(0, 8 - (maxY - minY)) - minY;
        let toObj = arr => arr.map(([x, y]) => ({ x: x + shiftX, y: y + shiftY }));
        return { black: toObj(bT), white: toObj(wT), answers: toObj(aT) };
    }

    // 코너(모서리) 고정 배치 - 진짜 바둑판 가장자리를 활용하는 문제용
    function cornerAnchor(p, corner) {
        let [x, y] = p;
        switch (corner) {
            case 1: return [8 - y, x];
            case 2: return [8 - x, 8 - y];
            case 3: return [y, 8 - x];
            default: return [x, y];
        }
    }
    function placeCornerTemplate(bRel, aRel, slideMax) {
        slideMax = slideMax || 0;
        let slide = slideMax > 0 ? randInt(0, slideMax) : 0;
        let shiftFn = ([x, y]) => [x + slide, y];
        let corner = randInt(0, 3);
        let bAbs = bRel.map(shiftFn).map(p => cornerAnchor(p, corner));
        let aAbs = aRel.map(shiftFn).map(p => cornerAnchor(p, corner));
        return { black: toObjArr(bAbs), answers: toObjArr(aAbs) };
    }

    /* =========================================================
       ⑨ 장문과 봉쇄
    ========================================================= */
    function genNet() {
        let bRel = [[-1,0],[0,-1],[2,0],[1,-1],[0,2],[-1,1]];
        let wRel = [[0,0]];
        let aRel = [[1,1]];
        let p = placeTemplate(bRel, wRel, aRel);
        return {
            type: 'play_single',
            blackStones: p.black,
            whiteStones: p.white,
            answers: p.answers,
            desc: '흰 돌에 직접 닿지 않으면서도 도망갈 곳을 모두 막는 자리를 찾아보세요! (장문)'
        };
    }

    /* =========================================================
       ⑩ 기초 사활 (두집 만들기 / 옥집 구별)
    ========================================================= */
    function genBent3() {
        let bRel = [[-1,0],[0,-1],[2,0],[1,-1],[1,1],[-1,1],[0,2]];

    function genSnapback() {

    function genLifeCorner() {

        };

    /* =========================================================
       ⓪ 승부 결정하기 (집 세기 / 승자 맞히기)
    ========================================================= */
    // 흑/백 각각 1~3개의 씨앗점을 무작위로 뿌리고, 모든 칸을 "가장 가까운 씨앗의 색"에
    // 배정하는 방식(보로노이 분할)으로 집 모양을 만든다. 이러면 매번 다른 모양의
    // 자연스러운(동서/남북 한 줄로 안 갈리는) 집이 나오고, 씨앗을 여러 개 두면 한쪽
    // 색이 여러 군데로 나뉜 집을 가질 수도 있다. 두 색이 만나는 경계 칸은 돌로,
    // 자기 색 칸으로만 둘러싸인 칸은 집(영토)으로 처리한다.
    // 실전 느낌을 위해, 활로가 1개뿐(단수 상태)인 돌이 하나라도 있으면 그 배치는 버리고 다시 만든다.
    function genTerritoryProblem(difficulty) {
        let fallback = null;
        for (let attempt = 0; attempt < 500; attempt++) {
            const seeds = [];
            const usedSeedKeys = new Set();
            const addSeeds = (side, count) => {
                let added = 0, tries = 0;
                while (added < count && tries < 50) {
                    tries++;
                    const x = randInt(0, 8), y = randInt(0, 8);
                    const k = key(x, y);
                    if (usedSeedKeys.has(k)) continue;
                    usedSeedKeys.add(k);
                    // 씨앗 좌표에 작은 무작위 지터를 줘서, 두 씨앗이 우연히 같은 행/열에 놓여도
                    // 경계가 완전한 직선(동서/남북 한 줄)이 되지 않고 항상 자연스럽게 구불거리게 한다.
                    seeds.push({
                        x, y, side,
                        jx: x + (Math.random() - 0.5) * 1.8,
                        jy: y + (Math.random() - 0.5) * 1.8
                    });
                    added++;
                }
            };
            addSeeds('A', randInt(1, 3));
            addSeeds('B', randInt(1, 3));
            if (!seeds.some(s => s.side === 'A') || !seeds.some(s => s.side === 'B')) continue;

            const ownerMap = {};
            for (let y = 0; y < BOARD_SIZE; y++) {
                for (let x = 0; x < BOARD_SIZE; x++) {
                    let best = null, bestDist = Infinity;
                    seeds.forEach(s => {
                        const d = Math.abs(s.jx - x) + Math.abs(s.jy - y);
                        if (d < bestDist) { bestDist = d; best = s; }
                    });
                    ownerMap[key(x, y)] = best.side;
                }
            }

            // 모든 가로줄(또는 모든 세로줄)에서 A가 차지한 칸 수가 완전히 똑같으면
            // 동서/남북으로 반듯하게 갈린 한 줄짜리 경계라는 뜻이므로 버리고 다시 만든다.
            const rowCountsA = [], colCountsA = [];
            for (let y = 0; y < BOARD_SIZE; y++) {
                let c = 0;
                for (let x = 0; x < BOARD_SIZE; x++) if (ownerMap[key(x, y)] === 'A') c++;
                rowCountsA.push(c);
            }
            for (let x = 0; x < BOARD_SIZE; x++) {
                let c = 0;
                for (let y = 0; y < BOARD_SIZE; y++) if (ownerMap[key(x, y)] === 'A') c++;
                colCountsA.push(c);
            }
            const isPerfectlyStraight = new Set(rowCountsA).size === 1 || new Set(colCountsA).size === 1;
            if (isPerfectlyStraight) continue;

            const sideAStones = [], sideBStones = [];
            let sideATerritory = 0, sideBTerritory = 0;
            for (let y = 0; y < BOARD_SIZE; y++) {
                for (let x = 0; x < BOARD_SIZE; x++) {
                    const mySide = ownerMap[key(x, y)];
                    const isBoundary = neighbors4(x, y).some(([nx, ny]) => ownerMap[key(nx, ny)] !== mySide);
                    if (isBoundary) {
                        (mySide === 'A' ? sideAStones : sideBStones).push({ x, y });
                    } else if (mySide === 'A') {
                        sideATerritory++;
                    } else {
                        sideBTerritory++;
                    }
                }
            }

            // 활로는 돌 하나가 아니라 "연결된 돌 무리(그룹)" 전체 기준으로 세야 바둑 규칙과 맞는다.
            const sideAKeys = new Set(sideAStones.map(p => key(p.x, p.y)));
            const sideBKeys = new Set(sideBStones.map(p => key(p.x, p.y)));
            const allStoneKeys = new Set([...sideAKeys, ...sideBKeys]);

            const minGroupLiberties = (stoneList, ownKeys) => {
                const visited = new Set();
                let minLibs = Infinity;
                stoneList.forEach(({ x, y }) => {
                    const startKey = key(x, y);
                    if (visited.has(startKey)) return;
                    visited.add(startKey);
                    const stack = [[x, y]];
                    const libSet = new Set();
                    while (stack.length) {
                        const [cx, cy] = stack.pop();
                        neighbors4(cx, cy).forEach(([nx, ny]) => {
                            const nk = key(nx, ny);
                            if (!allStoneKeys.has(nk)) {
                                libSet.add(nk);
                            } else if (ownKeys.has(nk) && !visited.has(nk)) {
                                visited.add(nk);
                                stack.push([nx, ny]);
                            }
                        });
                    }
                    if (libSet.size < minLibs) minLibs = libSet.size;
                });
                return minLibs;
            };

            const minLibsA = minGroupLiberties(sideAStones, sideAKeys);
            const minLibsB = minGroupLiberties(sideBStones, sideBKeys);
            if (minLibsA < 2 || minLibsB < 2) continue;

            const scoreA = sideAStones.length + sideATerritory;
            const scoreB = sideBStones.length + sideBTerritory;
            const diff = Math.abs(scoreA - scoreB);
            if (diff === 0) continue;

            const inRange = difficulty === 'easy' ? diff >= 8 :
                difficulty === 'medium' ? (diff >= 3 && diff <= 9) :
                (diff >= 1 && diff <= 4);

            fallback = { sideAStones, sideBStones, scoreA, scoreB };
            if (inRange) break;
        }
        let best = fallback;
        if (!best) return null;

        let blackIsA = Math.random() < 0.5;
        let blackStones = blackIsA ? best.sideAStones : best.sideBStones;
        let whiteStones = blackIsA ? best.sideBStones : best.sideAStones;
        let blackScore = blackIsA ? best.scoreA : best.scoreB;
        let whiteScore = blackIsA ? best.scoreB : best.scoreA;
        let winner = blackScore > whiteScore ? 'black' : 'white';

        let desc = difficulty === 'easy'
            ? '바둑이 끝났어요! 누가 이겼을까요? 집이 훨씬 많은 쪽의 돌을 골라보세요!'
            : difficulty === 'medium'
            ? '바둑이 끝났어요! 양쪽의 집을 잘 세어보고, 이긴 쪽의 돌을 골라보세요!'
            : '바둑이 끝났어요! 아주 팽팽한 승부예요. 집을 꼼꼼히 세어보고 이긴 쪽을 골라보세요!';

        return {
            type: 'choose_side',
            blackStones, whiteStones,
            blackScore, whiteScore, winner,
            desc
        };
    }

    /* =========================================================
       주제 목록 및 문제 세트 생성
    ========================================================= */
    function safeCall(fn) {
        try {
            let r = fn();
            if (r) return r;
        } catch (e) { console.error(e); }
        return genLiberty(1);
    }

        tierFns.forEach((fn, idx) => {
            for (let i = 0; i < counts[idx]; i++) result.push(safeCall(fn));
        });
        return result;
    }

    /* =========================================================
       화면/게임 제어 (기존 로직 재사용, 100 -> 가변 개수로 일반화)
    ========================================================= */
    function buildHomeScreen() {

        list.innerHTML = '';

            let lockIcon = locked ? '🔒 ' : '';
            let badge = isCleared ? '<span class="level-badge">✅ 클리어</span>' : '';

            let progressLine;
            if (!hasCharacter) {
                progressLine = '';
            } else if (!unlocked) {
                progressLine = `<span class="topic-progress-text">이전 레벨을 클리어하면 열려요</span>`;
            } else {
                let remain = isCleared ? '' : ` (클리어까지 ${CLEAR_THRESHOLD - points}점)`;
                progressLine = `
                    <div class="topic-progress-bg"><div class="topic-progress-fill" style="width:${points}%"></div></div>
                    <span class="topic-progress-text">${points}/${SCORE_MAX}점 (최고 기록)${remain}</span>`;
            }

            btn.innerHTML = `
                <div class="topic-top-row">
                    <span>${lockIcon}${t.title}</span>
                    ${badge}
                </div>
                <span class="desc-line">${t.sub} · 랜덤 20문제</span>
                ${progressLine}
            `;
            btn.onclick = () => startTopic(t.key);
            list.appendChild(btn);
        });
    }

    function switchScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function goHome() {
        renderCharacterHeader();
        buildHomeScreen();
        switchScreen('screen-home');
    }

    function startTopic(topicKey) {
        if (!currentUser) { alert('먼저 구글 로그인을 해주세요!'); return; }
        const character = getActiveCharacter();
        if (!character) { openCharacterSelect(); return; }
        const idx = TOPICS.findIndex(t => t.key === topicKey);
        if (!isTopicUnlocked(idx, character)) { alert('이전 레벨을 먼저 클리어해야 열려요!'); return; }
        currentTopicKey = topicKey;
        let topic = TOPICS.find(t => t.key === topicKey);
        problemsList = generateTopicSet(topic.tiers);
        currentProblemIndex = 0;
        totalScore = 0;
        document.getElementById('game-title').innerText = topic.title;
        initBoard();
        switchScreen('screen-game');
    }

    function retryTopic() { startTopic(currentTopicKey); }

    function initBoard() {
        const gridLines = document.getElementById('grid-lines');
        const intersections = document.getElementById('intersections');

        gridLines.innerHTML = ''; intersections.innerHTML = '';

        for (let i = 0; i < BOARD_SIZE; i++) {
            let hLine = document.createElement('div'); hLine.className = 'line-h'; hLine.style.top = (i * CELL_SIZE) + 'px';
            gridLines.appendChild(hLine);
            let vLine = document.createElement('div'); vLine.className = 'line-v'; vLine.style.left = (i * CELL_SIZE) + 'px';
            gridLines.appendChild(vLine);
        }

        for (let y = 0; y < BOARD_SIZE; y++) {
            for (let x = 0; x < BOARD_SIZE; x++) {
                let inter = document.createElement('div');
                inter.className = 'intersection';
                inter.style.left = (OFFSET + x * CELL_SIZE) + 'px'; inter.style.top = (OFFSET + y * CELL_SIZE) + 'px';
                inter.id = `pos-${x}-${y}`;
                inter.onclick = () => toggleMark(x, y);
                intersections.appendChild(inter);
            }
        }
        loadProblem();
    }

    function loadProblem() {
        userMarks = []; isProblemSolved = false; currentMistakes = 0;
        const total = problemsList.length;
        const currentProblem = problemsList[currentProblemIndex];

        document.getElementById('progress-text').innerText = `문제 ${currentProblemIndex + 1} / ${total}`;
        document.getElementById('progress-fill').style.width = `${((currentProblemIndex) / total) * 100}%`;
        document.getElementById('problem-desc').innerText = currentProblem.desc;

        document.getElementById('message').innerText = "";
        document.getElementById('message').className = "message";
        document.getElementById('btn-check').style.display = "inline-block";
        document.getElementById('btn-next').style.display = "none";

        const isChooseSide = currentProblem.type === 'choose_side';
        document.getElementById('choose-side-controls').style.display = isChooseSide ? 'flex' : 'none';
        document.getElementById('side-btn-black').classList.remove('selected');
        document.getElementById('side-btn-white').classList.remove('selected');

        for (let y = 0; y < BOARD_SIZE; y++) {
            for (let x = 0; x < BOARD_SIZE; x++) {
                document.getElementById(`pos-${x}-${y}`).innerHTML = "";
            }
        }

        currentProblem.blackStones.forEach(pos => {
            document.getElementById(`pos-${pos.x}-${pos.y}`).innerHTML = `<div class="stone black"></div>`;
        });
        currentProblem.whiteStones.forEach(pos => {
            document.getElementById(`pos-${pos.x}-${pos.y}`).innerHTML = `<div class="stone white"></div>`;
        });
    }

    function chooseSide(color) {
        if (isProblemSolved) return;
        userMarks = [{ choice: color }];
        document.getElementById('side-btn-black').classList.toggle('selected', color === 'black');
        document.getElementById('side-btn-white').classList.toggle('selected', color === 'white');
        document.getElementById('message').innerText = "";
    }

    function toggleMark(x, y) {
        if (isProblemSolved) return;
        const currentProblem = problemsList[currentProblemIndex];
        if (currentProblem.type === 'choose_side') return;

        if (currentProblem.blackStones.some(s => s.x === x && s.y === y)) return;
        if (currentProblem.whiteStones.some(s => s.x === x && s.y === y)) return;

        const cell = document.getElementById(`pos-${x}-${y}`);
        const markIndex = userMarks.findIndex(m => m.x === x && m.y === y);

        if (markIndex > -1) {
            userMarks.splice(markIndex, 1);
            cell.innerHTML = "";
        } else {
            if (currentProblem.type === "mark_multiple") {
                userMarks.push({x, y});
                cell.innerHTML = `<div class="stone white preview"></div>`;
            } else if (currentProblem.type === "play_single") {
                if (userMarks.length > 0) {
                    const prev = userMarks[0];
                    document.getElementById(`pos-${prev.x}-${prev.y}`).innerHTML = "";
                    userMarks = [];
                }
                userMarks.push({x, y});
                cell.innerHTML = `<div class="stone black preview"></div>`;
            }
        }
        document.getElementById('message').innerText = "";
    }

    function checkAnswer() {
        if (isProblemSolved) return;
        const currentProblem = problemsList[currentProblemIndex];
        const answers = currentProblem.answers;

        if (userMarks.length === 0) {
            const emptyMsg = currentProblem.type === 'choose_side'
                ? "흑과 백 중 이겼다고 생각하는 쪽을 골라보세요!"
                : "정답이라고 생각하는 곳에 돌을 놓아보세요!";
            showMessage(emptyMsg, false); return;
        }

        let isCorrect = false;
        if (currentProblem.type === "choose_side") {
            isCorrect = userMarks[0].choice === currentProblem.winner;
        } else if (currentProblem.type === "mark_multiple") {
            if (userMarks.length !== answers.length) {
                currentMistakes++; showMessage("숨구멍 갯수가 안맞아요! 다시 세어볼까요?", false); return;
            }
            isCorrect = answers.every(ans => userMarks.some(m => m.x === ans.x && m.y === ans.y));
        } else {
            const userAns = userMarks[0];
            isCorrect = answers.some(ans => userAns.x === ans.x && userAns.y === ans.y);
        }

        if (isCorrect) {
            isProblemSolved = true;
            let earnedPoints = Math.max(10 - (currentMistakes * 2), 2);
            totalScore += earnedPoints;

            if (currentProblem.type === "choose_side") {
                const winnerLabel = currentProblem.winner === 'black' ? '⚫ 흑' : '⚪ 백';
                showMessage(`정답이에요! ${winnerLabel} 승리! (흑 ${currentProblem.blackScore}집 · 백 ${currentProblem.whiteScore}집) 🎉`, true);
            } else {
                showMessage("참 잘했어요! 완벽해요! 🎉", true);
                userMarks.forEach(m => {
                   const st = document.getElementById(`pos-${m.x}-${m.y}`).querySelector('.stone');
                   if(st) st.classList.remove('preview');
                });
            }

            document.getElementById('btn-check').style.display = "none";
            document.getElementById('btn-next').style.display = "inline-block";
        } else {
            currentMistakes++;
            const wrongMsg = currentProblem.type === 'choose_side'
                ? "다시 세어볼까요? 집을 꼼꼼히 세어보세요!"
                : "아쉽네요. 조금만 더 생각해 볼까요?";
            showMessage(wrongMsg, false);
        }
    }

    function showMessage(text, isSuccess) {
        const msgDiv = document.getElementById('message');
        msgDiv.innerText = text;
        msgDiv.className = isSuccess ? "message success-msg" : "message";
    }

    function nextProblem() {
        currentProblemIndex++;
        if (currentProblemIndex >= problemsList.length) {
            const roundMax = problemsList.length * 10;
            const scaledScore = Math.min(SCORE_MAX, Math.round((totalScore / roundMax) * SCORE_MAX));
            document.getElementById('final-score').innerText = scaledScore;
            let topic = TOPICS.find(t => t.key === currentTopicKey);
            document.getElementById('result-topic-msg').innerText =
                `"${topic.title}" 문제 ${problemsList.length}개를 모두 풀었어요!`;
            const saveMsgEl = document.getElementById('result-save-msg');
            if (currentUser && getActiveCharacter()) {
                const result = saveTopicResult(currentTopicKey, totalScore, roundMax);
                renderCharacterHeader();
                saveMsgEl.innerText = (result && result.justCleared)
                    ? `기록이 저장됐어요! 🙌  🎉 레벨 클리어! 다음 레벨이 열렸어요! (Lv.${result.newCharacterLevel})`
                    : '기록이 저장됐어요! 🙌';
            } else {
                saveMsgEl.innerText = '로그인하면 기록이 저장돼요. (홈 화면에서 로그인해보세요!)';
            }
            switchScreen('screen-result');
        } else {
            loadProblem();
        }
    }

    buildHomeScreen();
</script>

</body>
</html>
